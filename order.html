<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>开单提交</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root { --primary: #4A154B; --bg-main: #f4f2f5; --text-main: #1f1121; --text-muted: #756676; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 100px; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; }
    .top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; }
    .editing-badge { font-size:12px; color:#e6a23c; background:#fff7eb; padding:6px 12px; border-radius:14px; font-weight:bold; border: 1px solid #f5dab1; }
    .big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; }
    .item { padding:14px 4px; border-bottom:1px solid #f4f2f5; box-sizing: border-box; }
    .item-main-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .prod-info { flex: 1; min-width: 0; }
    .prod-name { font-size: 15px; font-weight: 600; }
    .control-group { display: flex; align-items: center; gap: 6px; }
    .picker-wrapper { display: inline-flex; align-items: center; gap: 3px; font-size: 13px; }
    .ios-picker { background: #f4f2f5; color: var(--text-main); border: 1px solid #dcd6dd; border-radius: 6px; padding: 6px; font-size: 14px; font-weight: 700; }
    .aftersale-panel { background: #fdfaf6; border: 1px dashed #f5dab1; border-radius: 8px; padding: 12px; margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
    .aftersale-row-picks { display: flex; align-items: center; gap: 12px; }
    .aftersale-options { display: flex; gap: 14px; }
    .btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-top: 4px; }
    .btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }
    .brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }
    .spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0; border-bottom: 1px dashed #e2dde3; padding-bottom:6px; }
    .spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; }
    .spec-badge.active { background: var(--primary); color: #ffffff; }
    .amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; }
    .float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }
    .smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; }
    .date-picker-wrapper { position: relative; display: inline-block; }
    .real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .hide { display:none !important; }
  </style>
</head>
<body>

<div class="card">
  <div class="top-action-bar">
    <div class="back-btn" onclick="cancelOrder()">✕ 取消</div>
    <div id="editStateBadge" class="editing-badge hide">正在修改历史单据</div>
  </div>
  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/store.js"></script>

<script>
  // 接管状态与全局导航
  window.APP_STATE = {
    STATE: "ORDER", products: [], currentSelectedSpec: "ALL", currentSelectedBrand: null,
    currentEmployee: { code: new URLSearchParams(window.location.search).get('emp_code'), name: new URLSearchParams(window.location.search).get('emp_name') },
    currentStore: { atom: new URLSearchParams(window.location.search).get('atom_code'), name: new URLSearchParams(window.location.search).get('store_name') }, 
    orderData: null
  };

  // 修复核心：重写通用工具类里的状态流转，直接强制指向本页的刷新
  window.switchBrand = function(b) {
    window.APP_STATE.currentSelectedBrand = b;
    window.APP_STATE.currentSelectedSpec = "ALL";
    window.renderOrder();
  };
  window.switchSpec = function(s) {
    window.APP_STATE.currentSelectedSpec = s;
    window.renderOrder();
  };

  async function initOrderPage() {
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';
    
    const p = await window.client.from('products').select('*');
    window.APP_STATE.products = (p.data || []).map(x => ({ ...x, spec: (x.spec || '常规款').trim() }));
    
    const brands = [...new Set(window.APP_STATE.products.map(p => p.brand))];
    if(brands.length > 0) window.APP_STATE.currentSelectedBrand = brands[0];

    const orderId = urlParams.get('order_id');
    if(orderId) {
      document.getElementById('editStateBadge').classList.remove('hide');
      const items = JSON.parse(decodeURIComponent(urlParams.get('items')));
      window.APP_STATE.orderData = { id: orderId, atom: window.APP_STATE.currentStore.atom, name: window.APP_STATE.currentStore.name, date: urlParams.get('order_date'), items: {}, oldItemsMap: {} };
      items.forEach(it => {
        const parsedReturn = window.utils.parseReturnHandleText(it.return_handle);
        window.APP_STATE.orderData.items[it.product_id] = { 
          qty: Number(it.qty || 0), price: Number(it.price || 0), gift_qty: Number(it.gift_qty || 0),
          return_qty: Number(parsedReturn.qty || 0), return_handle: parsedReturn.handle,
          showPanel: Number(parsedReturn.qty || 0) > 0 || Number(it.gift_qty || 0) > 0
        };
        const pObj = window.APP_STATE.products.find(x => x.id == it.product_id);
        const specBox = window.utils.isSpecialSpecOreo(pObj) ? (pObj.pcs_per_box || 6) : 1;
        const saleBags = window.utils.isSpecialSpecOreo(pObj) ? (Number(it.qty || 0) * specBox) : Number(it.qty || 0);
        let oldNet = saleBags + Number(it.gift_qty || 0);
        if (parsedReturn.handle === 'RESTORE') oldNet -= Number(parsedReturn.qty || 0); 
        window.APP_STATE.orderData.oldItemsMap[it.product_id] = oldNet; 
      });
    } else {
      const d = new Date(); 
      const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      window.APP_STATE.orderData = { atom: window.APP_STATE.currentStore.atom, name: window.APP_STATE.currentStore.name, date: today, items: {}, oldItemsMap: {} }; 
    }
    window.renderOrder();
  }

  function cancelOrder() {
    window.location.href = `store.html?emp_code=${window.APP_STATE.currentEmployee.code}&emp_name=${encodeURIComponent(window.APP_STATE.currentEmployee.name)}`;
  }
  
  const originalSubmit = window.submitOrder;
  window.submitOrder = async function() {
     try { await originalSubmit(); } catch(e) {}
     window.location.href = `store.html?emp_code=${window.APP_STATE.currentEmployee.code}&emp_name=${encodeURIComponent(window.APP_STATE.currentEmployee.name)}`;
  };

  initOrderPage();
</script>
</body>
</html>
