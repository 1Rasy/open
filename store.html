<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>门店与账单中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"> <style>
    :root { --primary: #4A154B; --bg-main: #f4f2f5; --text-main: #1f1121; --text-muted: #756676; --card-bg: #ffffff; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 30px; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); }
    .top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; }
    .search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
    .search-wrapper input { width:100%; padding:12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa; }
    .big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; }
    .item { padding:14px 4px; border-bottom:1px solid #f4f2f5; box-sizing: border-box; width: 100%; cursor: pointer; }
    .letter-group-title { background: #f4f2f5; color: var(--primary); font-weight: 700; font-size: 14px; padding: 4px 8px; margin: 12px 0 6px 0; border-radius: 4px; }
    .store-top-gates { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn-gate-half { flex: 1; color: #fff; padding: 14px 8px; border-radius: 10px; font-size: 14px; font-weight: 700; text-align: center; border: none; cursor: pointer; }
    .btn-gate-stock { background: linear-gradient(135deg, var(--primary), #6b266c); }
    .btn-gate-report { background: linear-gradient(135deg, #1890ff, #0050b3); }
    .btn-new-order { background: var(--primary); color:#fff; padding:12px; width:100%; border-radius:8px; font-size: 16px; font-weight:600; text-align:center; border:none; margin-bottom: 15px;}
    .history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; }
    .amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; }
    .detail-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 4px; font-size: 13px; color: var(--text-muted); }
    .smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; cursor: pointer; }
    .sub { font-size:13px; color: var(--text-muted); }
    .hide { display:none !important; }
  </style>
</head>
<body>

<div class="card">
  <div class="top-action-bar">
    <div id="back" class="back-btn" onclick="goBack()">↩ 返回</div>
    <div id="pageEmpTitle" style="font-weight:bold; color:var(--primary)"></div>
  </div>

  <div id="searchBlock" class="search-wrapper">
    <input id="search" placeholder="🔍 输入门店名称或编码搜索店铺..." oninput="handleSearch()" />
  </div>

  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/store.js"></script>
<script src="js/report.js"></script>

<script>
  // 解析URL参数
  const urlParams = new URLSearchParams(window.location.search);
  const empCode = urlParams.get('emp_code');
  const empName = urlParams.get('emp_name');

  window.APP_STATE = {
    STATE: "STORE", stores: [], products: [],
    currentEmployee: { code: empCode, name: empName },
    currentStore: null, historyOrders: [], selectedReportDate: ""
  };

  async function initStorePage() {
    if(!empCode) { window.location.href = 'index.html'; return; }
    document.getElementById('pageEmpTitle').innerText = `员工: ${empName}`;
    document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';
    
    // 加载基础产品
    const p = await window.client.from('products').select('*');
    window.APP_STATE.products = (p.data || []).map(x => ({ ...x, spec: (x.spec || '常规款').trim() }));

    // 请求该员工绑定的门店
    const r = await window.client.from('employee_stores').select('atom_code').eq('employee_code', empCode);
    const codes = (r.data || []).map(i => String(i.atom_code).trim());

    if (codes.length === 0) {
      document.getElementById('list').innerHTML = `
        <div class="store-top-gates">
          <button class="btn-gate-half btn-gate-stock" onclick="goToStock()">📦 库存管理</button>
          <button class="btn-gate-half btn-gate-report" onclick="openSaleReport()">📊 卖进数据</button>
        </div>
        <div class="sub" style="text-align:center;padding:20px;color:red;">⚠️ 该员工未绑定任何门店</div>`;
      return;
    }

    const { data: matchedStores } = await window.client.from('stores_dim').select('*').in('atom_code', codes);
    window.APP_STATE.stores = (matchedStores || []).sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));
    
    window.renderStores();
  }

  // 覆写原逻辑里的跳转行为，换成真实的网页跳转
  function goToStock() {
    window.location.href = `stock.html?emp_code=${empCode}&emp_name=${encodeURIComponent(empName)}`;
  }
  
  // 覆写原 store.js 里的跳转行为
  window.openStockManagement = function() { goToStock(); };

  // 覆写原新建订单跳转
  window.openOrder = function(atom, name) {
    window.location.href = `order.html?emp_code=${empCode}&emp_name=${encodeURIComponent(empName)}&atom_code=${atom}&store_name=${encodeURIComponent(name)}`;
  };
  
  // 覆写原修改订单跳转
  window.editExistingOrder = function(orderId, orderDate, rawItemsEncoded) {
    window.location.href = `order.html?emp_code=${empCode}&emp_name=${encodeURIComponent(empName)}&atom_code=${window.APP_STATE.currentStore.atom}&store_name=${encodeURIComponent(window.APP_STATE.currentStore.name)}&order_id=${orderId}&order_date=${orderDate}&items=${rawItemsEncoded}`;
  };

  function handleSearch() {
    if(window.APP_STATE.STATE === 'STORE') window.renderStores();
  }

  function goBack() {
    if(window.APP_STATE.STATE === 'STORE') {
      window.location.href = 'index.html';
    } else if(window.APP_STATE.STATE === 'HISTORY' || window.APP_STATE.STATE === 'REPORT') {
      window.renderStores();
    } else if(window.APP_STATE.STATE === 'DETAIL') {
      const isFromReport = document.getElementById('list').getAttribute('data-from-report') === 'true';
      if(isFromReport) window.openSaleReport(window.APP_STATE.selectedReportDate);
      else window.renderHistory();
    }
  }

  initStorePage();
</script>
</body>
</html>
