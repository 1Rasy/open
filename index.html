<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>开单+库存</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<style>
:root {
  --primary: #4A154B;       
  --primary-hover: #360f37; 
  --accent: #ffb81c;        
  --bg-main: #f4f2f5;       
  --text-main: #1f1121;     
  --text-muted: #756676;    
  --card-bg: #ffffff;       
}

body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
.card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); position: relative;}

.top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

.back-btn {
  display: inline-flex; align-items: center; justify-content: center;
  background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px;
  font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; transition: all 0.2s;
}
.back-btn:active { background: #e2dde3; transform: scale(0.97); }
.back-btn::before { content: "←"; margin-right: 6px; font-weight: bold; font-size: 16px; }

.editing-badge { font-size:12px; color:#e6a23c; background:#fff7eb; padding:6px 12px; border-radius:14px; font-weight:bold; border: 1px solid #f5dab1; }

#list { width: 100%; }

.big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; letter-spacing: -0.5px; }

.emp-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 4px 0;
}

.emp-card {
  background: #faf9fa;
  border: 1px solid #eeeade;
  border-left: 4px solid var(--primary); 
  border-radius: 8px;
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  box-sizing: border-box;
}
.emp-card:active {
  background: #f3e2f5;
  transform: scale(0.97);
}

.store-container {
  padding-right: 24px;
  box-sizing: border-box;
}

.letter-group-title {
  background: #f4f2f5;
  color: var(--primary);
  font-weight: 700;
  font-size: 14px;
  padding: 4px 8px;
  margin: 12px 0 6px 0;
  border-radius: 4px;
}

/* 优化商品单行样式，支持换货弹窗展开 */
.item { 
  padding:14px 4px; 
  border-bottom:1px solid #f4f2f5; 
  box-sizing: border-box;
  width: 100%;
}
.item-main-row {
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  gap: 10px;
}

.prod-info { 
  flex: 1; 
  min-width: 0; 
}
.prod-name { 
  font-size: 15px; 
  font-weight: 600; 
  white-space: nowrap; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}

.control-group { 
  display: flex; 
  align-items: center; 
  gap: 8px; 
  flex-shrink: 0; 
}
.ctrl-item { 
  display: flex; 
  align-items: center; 
  font-size: 14px; 
}
.ctrl-val { 
  display: inline-block; 
  min-width: 20px; 
  text-align: center; 
  font-weight: 700; 
  font-size: 14px;
}

/* 极简售后扩展面板 */
.aftersale-panel {
  background: #fdfaf6;
  border: 1px dashed #f5dab1;
  border-radius: 6px;
  padding: 10px;
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.aftersale-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.aftersale-options {
  display: flex;
  gap: 10px;
}
.aftersale-options label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 600;
  cursor: pointer;
}

.btn-stock-gate { background: linear-gradient(135deg, var(--primary), #6b266c); color: #fff; padding: 14px; width: 100%; border-radius: 10px; font-size: 15px; font-weight: 700; margin-bottom: 16px; text-align: center; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(74,21,75,0.15);}
.btn-new-order { background: var(--primary); color:#fff; padding:12px; width:100%; border-radius:8px; font-size: 16px; font-weight:600; margin-bottom:15px; text-align:center;}
.smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; font-weight: 500; cursor: pointer;}

.date-picker-wrapper { position: relative; display: inline-block; }
.real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

.search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
.search-wrapper input { width:100%; padding:12px 40px 12px 12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa;}
.search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff;}
.search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }
.search-clear-btn:active { background: #d0c9d2; }

.btn-counter { background:#fbf4fc; color: var(--primary); font-weight: 700; padding: 4px 10px; border-radius: 6px; font-size: 15px; border:none;}
.btn-counter:active { background: #f3e2f5; }

/* 换货专用按钮样式 */
.btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-weight: bold; font-size: 11px; padding: 4px 6px; border-radius: 4px; }
.btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }

.brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }
.brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }
.brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }

.spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }
.spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500;}
.spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }

.brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }
.sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }
.hide { display:none !important; }

.history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; justify-content: space-between; align-items: center; }
.float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }

.stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box;}
.stock-input-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; align-items: center; }
.stock-input-box { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-muted); }
.stock-input-box input { width: 55px; padding: 6px; margin: 0; text-align: center; background: #fff; border: 1px solid #dcd6dd; border-radius: 4px; }

.stock-dir-select {
  padding: 5px 8px; background: #fff; border: 1px solid var(--primary); color: var(--primary);
  border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer;
}

.alphabet-sidebar {
  position: fixed;
  right: 16px;
  top: 140px;
  bottom: 100px;
  width: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 90;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(74,21,75,0.08);
  border: 1px solid #eeeade;
  user-select: none;
  -webkit-user-select: none;
}
.alphabet-letter {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  padding: 3px 0;
  width: 100%;
  text-align: center;
  cursor: pointer;
}
.alphabet-letter:active {
  color: var(--accent);
  transform: scale(1.3);
}
</style>
</head>

<body>

<div class="card">
<div id="searchBlock" class="search-wrapper">
  <input id="search" placeholder="快速搜索..." oninput="handleSearch()" />
  <div id="clearSearch" class="search-clear-btn" onclick="clearSearchInput()">✕</div>
</div>

<div class="top-action-bar">
  <div id="back" class="back-btn hide" onclick="goBack()">返回</div>
  <div id="editStateBadge" class="editing-badge hide">正在修改历史单据</div>
</div>

<div id="list"></div>
<div id="alphabetSidebar" class="alphabet-sidebar hide"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

<script>
const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let STATE = "EMP"; 
let employees = [];
let stores = []; 
let products = [];

let currentEmployee = null;
let currentStore = null; 
let orderData = null; 

let currentSelectedBrand = null; 
let currentSelectedSpec = "ALL"; 

let historyOrders = []; 
let stockData = {}; 

async function init(){
  const e = await client.from('employees').select('*');
  const p = await client.from('products').select('*');

  employees = e.data || [];
  products = (p.data || []).map(x => ({ ...x, spec: (x.spec || '常规款').trim() }));
  renderEmployees();
}

function handleSearch(){
  const val = document.getElementById('search').value;
  const clearBtn = document.getElementById('clearSearch');
  if(val && val.length > 0) {
    clearBtn.style.display = 'block';
  } else {
    clearBtn.style.display = 'none';
  }

  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function autoResetSearchState() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
}

function clearSearchInput() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function getSearch(){ return document.getElementById('search').value || ''; }

function renderEmployees(){
  STATE = 'EMP';
  document.getElementById('back').classList.add('hide');
  document.getElementById('editStateBadge').classList.add('hide'); 
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('alphabetSidebar').innerHTML = '';
  document.getElementById('searchBlock').classList.remove('hide'); 
  
  document.getElementById('search').placeholder = "🔍 输入姓名或工号搜索员工...";

  const k = getSearch();
  const list = employees.filter(e=> (e.employee_name||'').includes(k) || (e.employee_code||'').includes(k) );

  document.getElementById('list').innerHTML = `
    <div class="emp-grid">
      ${list.map(e=>`
        <div class='emp-card' onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
          <strong style="font-size:16px; color:var(--primary); display:block; margin-bottom:4px;">${e.employee_name}</strong>
          <div class='sub' style="font-size:12px;">${e.employee_code}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function openEmployee(code, name){
  autoResetSearchState();
  STATE = 'STORE';
  currentEmployee = {code, name};

  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">📊 正在载入负责门店档案...</div>';

  const r = await client.from('employee_stores').select('atom_code').eq('employee_code', code);
  const codes = (r.data || []).map(i => String(i.atom_code).trim());

  if (codes.length === 0) {
    document.getElementById('alphabetSidebar').classList.add('hide');
    document.getElementById('alphabetSidebar').innerHTML = '';
    document.getElementById('list').innerHTML = `
      <button class="btn-stock-gate" onclick="openStockManagement()">📦 库存管理</button>
      <div style='font-size:14px; font-weight:700; color:var(--primary); margin: 6px 0 14px 4px;'>门店总数：0 家</div>
      <div class="sub" style="text-align:center;padding:20px;color:red;">⚠️ 该员工未绑定任何门店</div>`;
    return;
  }

  const { data: matchedStores } = await client.from('stores_dim').select('*').in('atom_code', codes);
  
  stores = (matchedStores || []).sort((a, b) => {
    return (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN');
  });

  renderStores();
}

function getStoreFirstLetter(storeName) {
  if (!storeName) return '#';
  try {
    const firstChar = storeName.trim().charAt(0);
    const pinyin = pinyinPro.pinyin(firstChar, { pattern: 'first', toneType: 'none' });
    if (pinyin && pinyin.length > 0) {
      const letter = pinyin.charAt(0).toUpperCase();
      if (/[A-Z]/.test(letter)) return letter;
    }
  } catch (e) {
    console.error(e);
  }
  return '#';
}

function renderStores(){
  STATE = 'STORE';
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入门店名称或编码搜索店铺...";

  const k = getSearch();
  const f = stores.filter(s=> (s.store_name||'').includes(k) || (s.atom_code||'').includes(k) );

  const groupedStores = {};
  const activeLetters = new Set();

  f.forEach(s => {
    const letter = getStoreFirstLetter(s.store_name);
    if (!groupedStores[letter]) groupedStores[letter] = [];
    groupedStores[letter].push(s);
    activeLetters.add(letter);
  });

  const sortedLetters = Array.from(activeLetters).sort();
  const sidebarEl = document.getElementById('alphabetSidebar');
  
  if (sortedLetters.length > 1 && !k && f.length > 10) { 
    sidebarEl.classList.remove('hide');
    sidebarEl.innerHTML = sortedLetters.map(l => `
      <div class="alphabet-letter" onclick="scrollToLetterGroup('${l}')">${l}</div>
    `).join('');
  } else {
    sidebarEl.classList.add('hide');
    sidebarEl.innerHTML = '';
  }

  let listHtml = `
    <button class="btn-stock-gate" onclick="openStockManagement()">📦 库存管理</button>
    <div style='font-size:14px; font-weight:700; color:var(--primary); margin: 0 0 14px 4px;'>门店总数：${stores.length} 家</div>
    <div class="store-container">
  `;

  if (sortedLetters.length === 0) {
    listHtml += `<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;
  } else {
    sortedLetters.forEach(letter => {
      listHtml += `<div id="group_letter_${letter}" class="letter-group-title">${letter}</div>`;
      groupedStores[letter].forEach(s => {
        listHtml += `
          <div class='item' onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">
            <div class="item-main-row">
              <div>
                <strong style="font-size:16px;color:var(--primary);">${s.store_name}</strong>
                <div class='sub'>${s.atom_code}</div>
              </div>
            </div>
          </div>
        `;
      });
    });
  }

  listHtml += `</div>`;
  document.getElementById('list').innerHTML = listHtml;
}

function scrollToLetterGroup(letter) {
  const target = document.getElementById(`group_letter_${letter}`);
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

async function openStockManagement(){
  STATE = 'STOCK';
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('alphabetSidebar').innerHTML = '';
  document.getElementById('searchBlock').classList.add('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">📦 正在同步仓库实时库存...</div>';

  const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
  const stockMap = {};
  (currentStocks || []).forEach(st => { stockMap[st.product_id] = st.stock_qty || 0; });

  stockData = {
    emp_code: currentEmployee.code,
    currentStockMap: stockMap,
    additions: {} 
  };

  if(!currentSelectedBrand) {
    const brands = [...new Set(products.map(p => p.brand))];
    currentSelectedBrand = brands.length > 0 ? brands[0] : null;
    currentSelectedSpec = "ALL";
  }

  renderStockPage();
}

function generateFilterHeaderHtml() {
  const brands = [...new Set(products.map(p => p.brand))];
  if (!currentSelectedBrand && brands.length > 0) currentSelectedBrand = brands[0];

  const availableSpecs = [...new Set(products.filter(p => p.brand === currentSelectedBrand).map(p => p.spec))];
  
  if (currentSelectedSpec !== "ALL" && !availableSpecs.includes(currentSelectedSpec)) {
    currentSelectedSpec = "ALL";
  }

  return `
    <div class='brand-nav'>
      ${brands.map(b => `<div class="brand-badge ${b === currentSelectedBrand ? 'active' : ''}" onclick="selectBrand('${b}')">${b}</div>`).join('')}
    </div>
    <div class='spec-nav'>
      <div class="spec-badge ${currentSelectedSpec === 'ALL' ? 'active' : ''}" onclick="selectSpec('ALL')">全部规格</div>
      ${availableSpecs.map(sp => `<div class="spec-badge ${currentSelectedSpec === sp ? 'active' : ''}" onclick="selectSpec('${sp}')">${sp}</div>`).join('')}
    </div>
    <div class='brand'>📂 筛选结果：${currentSelectedBrand || '未选择'} ➔ ${currentSelectedSpec === 'ALL' ? '全部规格' : currentSelectedSpec}</div>
  `;
}

function selectBrand(brandName) { 
  currentSelectedBrand = brandName; 
  currentSelectedSpec = "ALL"; 
  if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); 
}
function selectSpec(specName) { 
  currentSelectedSpec = specName; 
  if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); 
}

function renderStockPage(){
  STATE = 'STOCK';
  document.getElementById('back').classList.remove('hide');
  
  const displayProducts = products.filter(p => {
    const matchBrand = p.brand === currentSelectedBrand;
    const matchSpec = currentSelectedSpec === "ALL" ? true : p.spec === currentSelectedSpec;
    return matchBrand && matchSpec;
  });

  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:700;color:var(--primary); font-size:15px;'>🏢 主体：${currentEmployee.name}</div>
    
    ${generateFilterHeaderHtml()}

    ${displayProducts.map(p => {
      const specCase = p.pcs_per_case || 24; 
      const specBox = p.pcs_per_box || 0;    
      const totalPcs = stockData.currentStockMap[p.id] || 0; 

      let displayCases = Math.floor(totalPcs / specCase);
      let displayBoxes = 0;
      let displayPcs = totalPcs % specCase;

      if (specBox > 0) {
        let remPcs = totalPcs % specCase;
        displayBoxes = Math.floor(remPcs / specBox);
        displayPcs = remPcs % specBox;
      }

      const currentDir = stockData.additions[p.id]?.dir || 'plus';
      const inputCases = stockData.additions[p.id]?.cases || '';
      const inputBoxes = stockData.additions[p.id]?.boxes || '';
      const inputPcs = stockData.additions[p.id]?.pcs || '';

      return `
        <div class="stock-row">
          <div style="font-weight:600; font-size:15px; color:var(--primary);">${p.spec} ${p.product_name} <span class="sub" style="font-size:12px; font-weight:normal;">(${specBox > 0 ? `1件=${Math.round(specCase/specBox)}中盒×${specBox}个` : `1件=${specCase}个`})</span></div>
          <div style="font-size:13px; margin-top:6px; color:#333; background:#f0ebf1; padding:6px 10px; border-radius:6px;">
            当前库存: <strong>${displayCases}</strong> 件 ${specBox > 0 ? `<strong>${displayBoxes}</strong> 中盒 ` : ''}<strong>${displayPcs}</strong> 个<span class="sub"> (共${totalPcs}个)</span>
          </div>
          <div class="stock-input-group">
            <div>
              <select class="stock-dir-select" onchange="updateStockInput('${p.id}', 'dir', this.value)">
                <option value="plus" ${currentDir === 'plus' ? 'selected' : ''}>增加 ➕</option>
                <option value="minus" ${currentDir === 'minus' ? 'selected' : ''}>减少 ➖</option>
              </select>
            </div>
            <div class="stock-input-box"><input type="number" placeholder="0" value="${inputCases}" oninput="updateStockInput('${p.id}', 'cases', this.value)"><span>件</span></div>
            ${specBox > 0 ? `<div class="stock-input-box"><input type="number" placeholder="0" value="${inputBoxes}" oninput="updateStockInput('${p.id}', 'boxes', this.value)"><span>中盒</span></div>` : ''}
            <div class="stock-input-box"><input type="number" placeholder="0" value="${inputPcs}" oninput="updateStockInput('${p.id}', 'pcs', this.value)"><span>个</span></div>
          </div>
        </div>
      `;
    }).join('')}
    
    ${displayProducts.length === 0 ? '<div class="sub" style="text-align:center;padding:40px;">⚠️ 该规格下暂未建立任何商品资料</div>' : ''}
    <button class='float-submit' onclick='submitStock()'>💾 更新库存</button>
  `;
}

function updateStockInput(prodId, type, val){
  if(!stockData.additions[prodId]) stockData.additions[prodId] = { dir: 'plus', cases: 0, boxes: 0, pcs: 0 };
  if(type === 'dir') stockData.additions[prodId].dir = val;
  else stockData.additions[prodId][type] = parseInt(val) || 0;
}

async function submitStock(){
  const addIds = Object.keys(stockData.additions);
  let hasData = false;
  const updates = [];
  const reportLines = []; 

  for(let id of addIds){
    const p = products.find(x => x.id == id);
    const specCase = p.pcs_per_case || 24;
    const specBox = p.pcs_per_box || 0;

    const dir = stockData.additions[id].dir || 'plus';
    const addedCases = stockData.additions[id].cases || 0;
    const addedBoxes = stockData.additions[id].boxes || 0;
    const addedPcs = stockData.additions[id].pcs || 0;

    let delta = specBox > 0 ? (addedCases * specCase) + (addedBoxes * specBox) + addedPcs : (addedCases * specCase) + addedPcs;

    if(delta > 0){
      hasData = true;
      const currentTotal = stockData.currentStockMap[id] || 0;
      
      let newTotal = currentTotal;
      if (dir === 'plus') {
        newTotal = currentTotal + delta;
      } else {
        newTotal = currentTotal - delta;
        if (newTotal < 0) {
          alert(`❌ 调整失败：[${p.product_name}] 的自主扣减量大过当前可用库存！`);
          return;
        }
      }
      updates.push({ employee_code: stockData.emp_code, product_id: id, stock_qty: newTotal });

      const dirText = dir === 'plus' ? '增加 ➕' : '减少 ➖';
      let detailText = '';
      if(addedCases > 0) detailText += `${addedCases}件 `;
      if(addedBoxes > 0) detailText += `${addedBoxes}中盒 `;
      if(addedPcs > 0) detailText += `${addedPcs}个`;

      reportLines.push(`• [${p.spec} ${p.product_name}] ${dirText} : ${detailText.trim()}`);
    }
  }

  if(!hasData){ alert("请输入需要变更的库存量！"); return; }
  const { error } = await client.from('emp_stocks').upsert(updates, { onConflict: 'employee_code,product_id' });
  if(error){ alert("库存更新失败：" + error.message); return; }

  const finalReport = `🌟 库存更新成功！\n\n变动明细如下：\n${reportLines.join('\n')}`;
  alert(finalReport);

  openStockManagement();
}

function editExistingOrder(orderId, orderDate, rawItemsEncoded) {
  STATE = 'ORDER';
  document.getElementById('searchBlock').classList.add('hide');

  const items = JSON.parse(decodeURIComponent(rawItemsEncoded));
  
  orderData = { 
    id: orderId, 
    atom: currentStore.atom, 
    name: currentStore.name, 
    date: orderDate, 
    items: {},
    oldItemsMap: {} 
  };

  items.forEach(it => {
    orderData.items[it.product_id] = { 
      qty: it.qty, 
      price: it.price,
      // 🟢 恢复老单据的售后数据
      return_qty: it.return_qty || 0,
      return_handle: it.return_handle || 'RESTORE'
    };
    
    // 记录旧的净库存影响量：销售数(正) - 获退良品数(负，如果是SCRAP不加库存则为0)
    let oldNet = it.qty - (it.return_handle === 'RESTORE' ? (it.return_qty || 0) : 0);
    orderData.oldItemsMap[it.product_id] = oldNet; 
  });

  const brands = [...new Set(products.map(p => p.brand))];
  currentSelectedBrand = brands.length > 0 ? brands[0] : null;
  currentSelectedSpec = "ALL";

  document.getElementById('editStateBadge').classList.remove('hide');

  renderOrder();
}

function openOrder(atom,name){
  STATE = 'ORDER'; 
  const d = new Date(); 
  const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  
  orderData = { atom, name, date: today, items: {} }; 
  
  document.getElementById('searchBlock').classList.add('hide');
  document.getElementById('editStateBadge').classList.add('hide'); 

  const brands = [...new Set(products.map(p => p.brand))];
  currentSelectedBrand = brands.length > 0 ? brands[0] : null;
  currentSelectedSpec = "ALL";

  renderOrder();
}

function renderOrder(){
  STATE = 'ORDER';
  document.getElementById('back').classList.remove('hide'); 
  
  const displayProducts = products.filter(p => {
    const matchBrand = p.brand === currentSelectedBrand;
    const matchSpec = currentSelectedSpec === "ALL" ? true : p.spec === currentSelectedSpec;
    return matchBrand && matchSpec;
  });

  document.getElementById('list').innerHTML = `
    <div class="big-store-title">${orderData.name}</div>
    
    <div class='row' style='margin-bottom:16px; display:flex; align-items:center; gap:12px;'>
      <span style="font-size:15px;font-weight:700;">📅 日期：<span id='dateText'>${orderData.date}</span></span>
      <div class="date-picker-wrapper">
        <button class='smallbtn' style="background:#e8f4ff; color:#1890ff; border-color:#bae7ff; font-weight:bold; padding:6px 12px;">📅 修改日期</button>
        <input type="date" class="real-date-input" value="${orderData.date}" onchange="syncSelectedDate(this.value)">
      </div>
    </div>
    
    ${generateFilterHeaderHtml()}

    ${displayProducts.map(p => {
      const itData = orderData.items[p.id] || { qty: 0, price: p.default_price, return_qty: 0, return_handle: 'RESTORE', showPanel: false };
      
      return `
        <div class='item'>
          <div class="item-main-row">
            <div class='prod-info'>
              <div class='prod-name'>${p.spec} ${p.product_name}</div>
              <div style="margin-top: 4px;">
                <button id="btn_as_${p.id}" class="btn-aftersale-trigger ${itData.return_qty > 0 ? 'active' : ''}" 
                        onclick="toggleAfterSalePanel('${p.id}')">
                  🔄 售后回收 ${itData.return_qty > 0 ? `(${itData.return_qty}个)` : ''}
                </button>
              </div>
            </div>
            
            <div class='control-group'>
              <div class='ctrl-item'>
                <button class='btn-counter' onclick="changeQty('${p.id}',-1)">-</button>
                <span class='ctrl-val' id='q_${p.id}'>${itData.qty}</span>
                <button class='btn-counter' onclick="changeQty('${p.id}',1)">+</button>
              </div>
              <div class='ctrl-item'>
                <button class='btn-counter' onclick="changePrice('${p.id}',-0.1)">-</button>
                <span class='ctrl-val' id='p_${p.id}' style='min-width:34px;'>${itData.price}</span>
                <button class='btn-counter' onclick="changePrice('${p.id}',0.1)">+</button>
                <span style="font-size:11px;color:var(--text-muted);margin-left:1px;">元</span>
              </div>
            </div>
          </div>

          <div id="panel_${p.id}" class="aftersale-panel ${itData.showPanel ? '' : 'hide'}">
            <div class="aftersale-row">
              <strong>收回旧货数量：</strong>
              <div class="ctrl-item">
                <button class='btn-counter' style="background:#fff; border:1px solid #ccc; padding:2px 8px;" onclick="changeReturnQty('${p.id}',-1)">-</button>
                <span class='ctrl-val' id='rq_${p.id}' style="min-width:30px; font-size:15px; color:#e6a23c;">${itData.return_qty || 0}</span>
                <button class='btn-counter' style="background:#fff; border:1px solid #ccc; padding:2px 8px;" onclick="changeReturnQty('${p.id}',1)">+</button>
              </div>
            </div>
            <div class="aftersale-row">
              <strong>旧货状态处理：</strong>
              <div class="aftersale-options">
                <label><input type="radio" name="handle_${p.id}" value="RESTORE" ${itData.return_handle !== 'SCRAP' ? 'checked' : ''} onchange="setReturnHandle('${p.id}', 'RESTORE')">🟢 还能卖(加库存)</label>
                <label><input type="radio" name="handle_${p.id}" value="SCRAP" ${itData.return_handle === 'SCRAP' ? 'checked' : ''} onchange="setReturnHandle('${p.id}', 'SCRAP')">🔴 已过期(不加库存)</label>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('')}

    ${displayProducts.length === 0 ? '<div class="sub" style="text-align:center;padding:40px;">⚠️ 该规格下暂未建立任何商品资料</div>' : ''}
    <button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>
  `;
}

function initItemState(id) {
  if(!orderData.items[id]){ 
    const p = products.find(x => x.id == id); 
    orderData.items[id] = { qty: 0, price: p.default_price, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; 
  }
}

function toggleAfterSalePanel(id) {
  initItemState(id);
  orderData.items[id].showPanel = !orderData.items[id].showPanel;
  const el = document.getElementById(`panel_${id}`);
  if(orderData.items[id].showPanel) el.classList.remove('hide'); else el.classList.add('hide');
}

function changeQty(id, v){
  initItemState(id);
  orderData.items[id].qty = Math.max(0, (orderData.items[id].qty || 0) + v); 
  document.getElementById('q_' + id).innerText = orderData.items[id].qty;
}

function changePrice(id, v){
  initItemState(id);
  orderData.items[id].price = +(orderData.items[id].price + v).toFixed(1); 
  document.getElementById('p_' + id).innerText = orderData.items[id].price;
}

// 🟢 新增：控制旧货回收数量
function changeReturnQty(id, v) {
  initItemState(id);
  orderData.items[id].return_qty = Math.max(0, (orderData.items[id].return_qty || 0) + v);
  document.getElementById('rq_' + id).innerText = orderData.items[id].return_qty;
  
  // 同步刷新触发器按钮上的文本
  const btn = document.getElementById(`btn_as_${id}`);
  if(orderData.items[id].return_qty > 0) {
    btn.classList.add('active');
    btn.innerText = `🔄 售后回收 (${orderData.items[id].return_qty}个)`;
  } else {
    btn.classList.remove('active');
    btn.innerText = `🔄 售后回收`;
  }
}

// 🟢 新增：控制旧货是属于良品还是过期损耗
function setReturnHandle(id, handleType) {
  initItemState(id);
  orderData.items[id].return_handle = handleType;
}

function syncSelectedDate(val){
  if(!val) return;
  orderData.date = val;
  document.getElementById('dateText').innerText = val;
}

async function submitOrder(){
  // 校验：无论是卖出了东西还是收回了旧货，只要有操作即可提交
  const hasAction = Object.keys(orderData.items).some(id => orderData.items[id].qty > 0 || orderData.items[id].return_qty > 0); 
  if(!hasAction){ alert("单据内没有任何有效的销售或售后动作，无法提交"); return; }

  const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
  const liveStockMap = {};
  (currentStocks || []).forEach(st => { liveStockMap[st.product_id] = st.stock_qty || 0; });

  const stockUpdates = [];
  let isStockDeficit = false; 

  const allProdIds = new Set([...Object.keys(orderData.items), ...Object.keys(orderData.oldItemsMap || {})]);

  for (let id of allProdIds) {
    const item = orderData.items[id] || { qty: 0, return_qty: 0, return_handle: 'RESTORE' };
    const oldNetImpact = orderData.oldItemsMap?.[id] || 0; 

    // 🟢 极其精密的库存流转计算：
    // 本次净库存减少量 = 本次开单送出数量 - (如果是良品回收 ? 回收数量 : 0)
    let currentNetImpact = item.qty - (item.return_handle === 'RESTORE' ? (item.return_qty || 0) : 0);
    
    // 多退少补差异 = 当前要减的 - 历史老单已经减掉的
    const delta = currentNetImpact - oldNetImpact; 
    
    const currentAvailStock = liveStockMap[id] || 0;
    const finalNewStock = currentAvailStock - delta;

    if (finalNewStock < 0) {
      isStockDeficit = true; 
    }

    // 只要对库存有绝对变动差异，或者当前单据里留有该商品，就同步刷入
    if (delta !== 0 || item.qty > 0 || item.return_qty > 0) {
      stockUpdates.push({ employee_code: currentEmployee.code, product_id: id, stock_qty: finalNewStock });
    }
  }

  if (orderData.id) {
    // 处于【修改已有历史订单】分支
    const { error: updateOrderErr } = await client.from('orders').update({ order_date: orderData.date }).eq('id', orderData.id);
    if(updateOrderErr){ alert("账单日期更新失败：" + updateOrderErr.message); return; }

    const { error: delErr } = await client.from('order_items').delete().eq('order_id', orderData.id);
    if(delErr){ alert("旧账单明细清空失败：" + delErr.message); return; }

    // 重新写入新明细（包含售后数据）
    const items = []; 
    Object.keys(orderData.items).forEach(id => { 
      const it = orderData.items[id]; 
      if(it.qty > 0 || it.return_qty > 0){ 
        items.push({ 
          order_id: orderData.id, 
          product_id: id, 
          qty: it.qty, 
          price: it.price,
          return_qty: it.return_qty || 0,
          return_handle: it.return_handle || 'RESTORE'
        }); 
      } 
    });
    const { error: itemErr } = await client.from('order_items').insert(items); 
    if(itemErr){ alert("新明细覆盖写入失败：" + itemErr.message); return; }

  } else {
    // 处于【纯新增开单】分支
    const { data: o, error } = await client.from('orders').insert({ employee_code: currentEmployee.code, atom_code: orderData.atom, order_date: orderData.date }).select().single();
    if(error){ alert("主订单提交失败：" + error.message); return; }

    const items = []; 
    Object.keys(orderData.items).forEach(id=>{ 
      const it = orderData.items[id]; 
      if(it.qty > 0 || it.return_qty > 0){ 
        items.push({ 
          order_id: o.id, 
          product_id: id, 
          qty: it.qty, 
          price: it.price,
          return_qty: it.return_qty || 0,
          return_handle: it.return_handle || 'RESTORE'
        }); 
      } 
    });
    const { error: itemErr } = await client.from('order_items').insert(items); 
    if(itemErr){ alert("商品明细提交失败：" + itemErr.message); return; }
  }

  if (stockUpdates.length > 0) {
    const { error: stockErr } = await client.from('emp_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_id' });
    if(stockErr) alert("单据已生成，但库存扣减异常：" + stockErr.message);
  }

  if (isStockDeficit) {
    alert('成功提交！注意：由于包含了换货和销售，部分商品当前可用库存已变负，请及时补充！');
  } else {
    alert('成功！');
  }

  openStoreHistory(currentStore.atom, currentStore.name);
}

function goBack(){
  autoResetSearchState();

  if(STATE === 'STOCK') {
    renderStores(); 
  } else if(STATE === 'DETAIL') {
    renderHistory();
  } else if(STATE === 'ORDER') {
    if (orderData && orderData.id) {
      viewOrderDetail(orderData.id, orderData.date);
    } else {
      renderHistory();
    }
  } else if(STATE === 'HISTORY') {
    renderStores(); 
  } else if(STATE === 'STORE') {
    document.getElementById('alphabetSidebar').classList.add('hide'); 
    document.getElementById('alphabetSidebar').innerHTML = '';
    renderEmployees();
  }
}
