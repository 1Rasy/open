<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>门店开单系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:20px; background:#f5f5f5; }
.card { background:#fff; padding:15px; border-radius:10px; }
.item { padding:12px; border-bottom:1px solid #eee; cursor:pointer; }
.item:hover { background:#f0f7ff; }
input, select { width:100%; padding:10px; margin-bottom:10px; }
.back { color:#1677ff; cursor:pointer; display:none; margin-bottom:10px; }
.sub { font-size:12px; color:#888; }
button { background:#1677ff; color:#fff; border:none; padding:6px 10px; border-radius:6px; }
</style>
</head>

<body>

<h2>📦 门店开单系统</h2>

<div class="card">

<input id="search" placeholder="搜索..." oninput="handleSearch()" />

<div id="back" class="back" onclick="back()">← 返回</div>

<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
  "https://mnmzqmqxdzagpounvchn.supabase.co",
  "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF"
);

let employees = [];
let STATE = "employees";
let currentEmployee = null;

// ================== 1. 初始化 ==================
async function init() {
  const { data } = await client.from("employees").select("*");
  employees = data || [];
  renderEmployees();
}

// ================== 2. 搜索控制 ==================
function handleSearch() {
  if (STATE === "employees") {
    renderEmployees();
  } else {
    renderStores();
  }
}

// ================== 3. 员工列表 ==================
function renderEmployees() {

  STATE = "employees";
  document.getElementById("back").style.display = "none";

  const key = document.getElementById("search").value || "";

  const list = employees.filter(e =>
    (e.employee_name || "").includes(key) ||
    (e.employee_code || "").includes(key)
  );

  document.getElementById("list").innerHTML = list.map(e => `
    <div class="item" onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
      ${e.employee_name}
      <div class="sub">${e.employee_code}</div>
    </div>
  `).join("");
}

// ================== 4. 进入员工 ==================
async function openEmployee(code, name) {

  STATE = "stores";
  currentEmployee = { code, name };

  document.getElementById("back").style.display = "block";

  document.getElementById("list").innerHTML = "加载中...";

  const { data: links } = await client
    .from("employee_stores")
    .select("atom_code")
    .eq("employee_code", code);

  const atomCodes = (links || []).map(i => i.atom_code);

  const { data: stores } = await client
    .from("stores_dim")
    .select("*")
    .in("atom_code", atomCodes);

  renderStores(stores || []);
}

// ================== 5. 门店列表 + 开单 ==================
function renderStores(stores = []) {

  const key = document.getElementById("search").value || "";

  const filtered = stores.filter(s =>
    (s.store_name || "").includes(key)
  );

  document.getElementById("list").innerHTML = `
    <h3>${currentEmployee.name}</h3>

    ${filtered.map(s => `
      <div class="item">
        ${s.store_name}
        <div class="sub">${s.atom_code}</div>

        <input type="date" id="date_${s.atom_code}" />

        <button onclick="submitOrder('${s.atom_code}')">开单上传</button>
      </div>
    `).join("")}
  `;
}

// ================== 6. 上传订单 ==================
async function submitOrder(atom_code) {

  const date = document.getElementById("date_" + atom_code).value;

  if (!date) {
    alert("请选择日期");
    return;
  }

  const { error } = await client.from("orders").insert([{
    employee_code: currentEmployee.code,
    atom_code,
    order_date: date,
    created_at: new Date().toISOString()
  }]);

  if (error) {
    alert("提交失败：" + error.message);
    return;
  }

  alert("开单成功！");
}

// ================== 7. 返回 ==================
function back() {
  renderEmployees();
}

init();

</script>

</body>
</html>
