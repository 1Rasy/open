ont-size: 16px; font-weight:600; margin-bottom:15px; text-align:center; border:none; }.smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; font-weight: 500; cursor: pointer; }.date-picker-wrapper { position: relative; display: inline-block; }.real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }.search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }.search-wrapper input { width:100%; padding:12px 40px 12px 12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa; }.search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff; }.search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }.search-clear-btn:active { background: #d0c9d2; }.btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-weight: bold; font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-top: 4px; }.btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }.brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }.brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }.brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }.spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }.spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500; }.spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }.brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }.sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }.hide { display:none !important; }.history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }.float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }.stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box; }.stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }.stock-dir-select { padding: 5px 8px; background: #fff; border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }.alphabet-sidebar { position: fixed; right: 16px; top: 140px; bottom: 100px; width: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; background: rgba(255, 255, 255, 0.85); border-radius: 12px; box-shadow: 0 2px 8px rgba(74,21,75,0.08); border: 1px solid #eeeade; user-select: none; -webkit-user-select: none; }.amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; color: #2b1d2c; }.amount-summary-banner strong { font-size: 15px; }.detail-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 4px; font-size: 13px; color: var(--text-muted); line-height: 1.4; }.detail-grid-item { display: flex; justify-content: space-between; align-items: center; }</style></head><body>

function isSpecialSpecOreo(productObj) {
  if (!productObj || !productObj.spec) return false;
  return productObj.spec.includes("3片装");
}

function formatQtyToUnits(totalPcs, specCase, specBox, showCase = true) {
  if (specBox > 0) {
    if (showCase) {
      let displayCases = Math.floor(totalPcs / specCase);
      let remPcs = totalPcs % specCase;
      let displayBoxes = Math.floor(remPcs / specBox);
      let displayPcs = remPcs % specBox;
      return `${displayCases}件 ${displayBoxes}盒 ${displayPcs}个`;
    } else {
      let displayBoxes = Math.floor(totalPcs / specBox);
      let displayPcs = totalPcs % specBox;
      return `${displayBoxes}盒 ${displayPcs}个`;
    }
  } else {
    let displayCases = Math.floor(totalPcs / specCase);
    let displayPcs = totalPcs % specCase;
    return showCase ? `${displayCases}件 ${displayPcs}个` : `${displayPcs}个`;
  }
}

function getPriceDecimalPlaces(prodId) {
  const idNum = Number(prodId);
  return (idNum >= 49 && idNum <= 55) ? 2 : 1;
}

function getLiveRowAmounts(productObj, qty, livePrice, giftQty, returnQty, returnHandle) {
  let saleAmount = 0; 
  let giftAmount = 0; 
  let restoreAmount = 0; 
  let scrapAmount = 0;    

  const isOreo = isSpecialSpecOreo(productObj);
  const defaultPrice = isOreo ? 17.5 : (productObj.default_price || 15);
  const specBox = isOreo ? (productObj.pcs_per_box || 6) : 0;

  if (isOreo) {
    saleAmount = qty * livePrice;
    const liveSingleBagPrice = livePrice / (specBox || 6);
    const defaultSingleBagPrice = defaultPrice / (specBox || 6);
    giftAmount = giftQty * defaultSingleBagPrice; 
    if (returnHandle === 'SCRAP') {
      scrapAmount = returnQty * liveSingleBagPrice; 
    } else {
      restoreAmount = returnQty * liveSingleBagPrice; 
    }
  } else {
    saleAmount = qty * livePrice;
    giftAmount = giftQty * defaultPrice; 
    if (returnHandle === 'SCRAP') {
      scrapAmount = returnQty * livePrice;
    } else {
      restoreAmount = returnQty * livePrice;
    }
  }
  return { saleAmount, giftAmount, restoreAmount, scrapAmount };
}

function parseReturnHandleText(val) {
  if (!val || typeof val !== 'string' || !val.includes('_')) {
    return { qty: 0, handle: 'RESTORE' };
  }
  const parts = val.split('_');
  return { qty: parseInt(parts[0]) || 0, handle: parts[1] || 'RESTORE' };
}

function handleSearch(){
  const val = document.getElementById('search').value;
  const clearBtn = document.getElementById('clearSearch');
  if(val && val.length > 0) clearBtn.style.display = 'block';
  else clearBtn.style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function autoResetSearchState() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
}

function clearSearchInput() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function getSearch(){ return document.getElementById('search').value || ''; }

function renderEmployees(){

  orderData = null;

async function openEmployee(code, name){
  autoResetSearchState();
  STATE = 'STORE';
  orderData = null; 
  currentEmployee = {code, name};
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide');

  const codes = (r.data || []).map(i => String(i.atom_code).trim());

  if (codes.length === 0) {

  const { data: matchedStores } = await client.from('stores_dim').select('*').in('atom_code', codes);
  stores = (matchedStores || []).sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));

function getStoreFirstLetter(storeName) {
  if (!storeName) return '#';
  try {
    const firstChar = storeName.trim().charAt(0);
    const pinyin = pinyinPro.pinyin(firstChar, { pattern: 'first', toneType: 'none' });
    if (pinyin && pinyin.length > 0) {
      const letter = pinyin.charAt(0).toUpperCase();
      if (/[A-Z]/.test(letter)) return letter;
    }
  } catch (e) { console.error(e); }
  return '#';
}

function renderStores(){
  STATE = 'STORE';
  orderData = null; 
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入门店名称或编码搜索店铺...";

  const k = getSearch();
  const f = stores.filter(s=> (s.store_name||'').includes(k) || (s.atom_code||'').includes(k) );

  const groupedStores = {};
  const activeLetters = new Set();

  f.forEach(s => {
    const letter = getStoreFirstLetter(s.store_name);
    if (!groupedStores[letter]) groupedStores[letter] = [];
    groupedStores[letter].push(s);
    activeLetters.add(letter);
  });

  const sortedLetters = Array.from(activeLetters).sort();
  const sidebarEl = document.getElementById('alphabetSidebar');
  
  if (sortedLetters.length > 1 && !k && f.length > 10) {

  } else {
    sidebarEl.classList.add('hide'); sidebarEl.innerHTML = '';

  let listHtml = `
    <div class="store-top-gates">
      <button class="btn-gate-half btn-gate-stock" onclick="openStockManagement()">📦 库存管理</button>
      <button class="btn-gate-half btn-gate-report" onclick="openSaleReport()">📊 卖进数据</button>

  `;

  if (sortedLetters.length === 0) {
    listHtml += `<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;

                <div class='sub'>${s.atom_code}</div>
              </div>
            </div>
          </div>
        `;
      });
    });
  }
  listHtml += `</div>`;
  document.getElementById('list').innerHTML = listHtml;
}

function scrollToLetterGroup(letter) {
  const target = document.getElementById(`group_letter_${letter}`);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

  return `

      ${brands.map(b => `<div class="brand-badge ${b === currentSelectedBrand ? 'active' : ''}" onclick="selectBrand('${b}')">${b}</div>`).join('')}

    </div>
    <div class='brand'>📂 筛选结果：${currentSelectedBrand || '未选择'} ➔ ${currentSelectedSpec === 'ALL' ? '全部规格' : currentSelectedSpec}</div>

function selectBrand(brandName) { currentSelectedBrand = brandName; currentSelectedSpec = "ALL"; if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); }
function selectSpec(specName) { currentSelectedSpec = specName; if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); }

function makePureQtyOptionsHtml(max, current) {
  let html = '';
  for(let i=0; i<=max; i++) {
    html += `<option value="${i}" ${i === current ? 'selected' : ''}>${i}</option>`;
  }
  return html;
}

function makePurePriceOptionsHtml(centerPrice, stepPlaces, currentSelected) {
  let html = '';
  let start = Math.max(0.1, centerPrice - 15);
  let end = centerPrice + 30;
  let step = stepPlaces === 2 ? 0.05 : 0.1; 
  for (let p = start; p <= end; p += step) {
    let val = +p.toFixed(stepPlaces);
    html += `<option value="${val}" ${Math.abs(val - currentSelected) < 0.005 ? 'selected' : ''}>${val.toFixed(stepPlaces)}</option>`;
  }
  return html;
}

function renderStockPage(){
  STATE = 'STOCK';
  document.getElementById('back').classList.remove('hide');

    ${generateFilterHeaderHtml()}
    ${displayProducts.map(p => {
      const isOreoSpecial = isSpecialSpecOreo(p);
      const specCase = p.pcs_per_case || 24; 
      const specBox = isOreoSpecial ? (p.pcs_per_box || 6) : (p.pcs_per_box || 0);     
      
      const totalPcs = stockData.currentStockMap[p.id] || 0; 
      const formattedStockText = formatQtyToUnits(totalPcs, specCase, specBox, true);

      const currentDir = stockData.additions[p.id]?.dir || 'plus';
      const curC = stockData.additions[p.id]?.cases || 0;
      const curB = stockData.additions[p.id]?.boxes || 0;
      const curP = stockData.additions[p.id]?.pcs || 0;

      return `

          <div class="stock-input-group">
            <select class="stock-dir-select" onchange="updateStockInput('${p.id}', 'dir', this.value)">
              <option value="plus" ${currentDir === 'plus' ? 'selected' : ''}>增加 ➕</option>
              <option value="minus" ${currentDir === 'minus' ? 'selected' : ''}>减少 ➖</option>
            </select>
            
            <div class="picker-wrapper">
              <select class="ios-picker" onchange="updateStockInput('${p.id}', 'cases', this.value)">${makePureQtyOptionsHtml(50, curC)}</select><span class="unit-txt">件</span>
            </div>
            <div class="picker-wrapper">
              <select class="ios-picker" onchange="updateStockInput('${p.id}', 'boxes', this.value)">${makePureQtyOptionsHtml(50, curB)}</select><span class="unit-txt">盒</span>
            </div>
            <div class="picker-wrapper">
              <select class="ios-picker" onchange="updateStockInput('${p.id}', 'pcs', this.value)">${makePureQtyOptionsHtml(100, curP)}</select><span class="unit-txt">个</span>
            </div>
          </div>
        </div>
      `;
    }).join('')}
    <button class='float-submit' onclick='submitStock()'>💾 更新库存</button>
  `;
}

function updateStockInput(prodId, type, val){
  if(!stockData.additions[prodId]) stockData.additions[prodId] = { dir: 'plus', cases: 0, boxes: 0, pcs: 0 };
  if(type === 'dir') stockData.additions[prodId].dir = val;
  else stockData.additions[prodId][type] = parseInt(val) || 0;
}

async function submitStock(){
  const addIds = Object.keys(stockData.additions);
  let hasData = false; const updates = []; const reportLines = []; 

  for(let id of addIds){
    const p = products.find(x => x.id == id);
    const isOreoSpecial = isSpecialSpecOreo(p);
    const specCase = p.pcs_per_case || 24; 
    const specBox = isOreoSpecial ? (p.pcs_per_box || 6) : (p.pcs_per_box || 0);
    
    const dir = stockData.additions[id].dir || 'plus';
    const addedCases = stockData.additions[id].cases || 0;
    const addedBoxes = stockData.additions[id].boxes || 0;
    const addedPcs = stockData.additions[id].pcs || 0;

    let delta = specBox > 0 ? (addedCases * specCase) + (addedBoxes * specBox) + addedPcs : (addedCases * specCase) + addedPcs;
    if(delta > 0){
      hasData = true; const currentTotal = stockData.currentStockMap[id] || 0;
      let newTotal = dir === 'plus' ? currentTotal + delta : currentTotal - delta;
      if (newTotal < 0) { alert(`❌ [${p.product_name}] 可用库存不足！`); return; }
      updates.push({ employee_code: stockData.emp_code, product_id: id, stock_qty: newTotal });
    }
  }
  if(!hasData){ alert("请输入变更量！"); return; }
  await client.from('emp_stocks').upsert(updates, { onConflict: 'employee_code,product_id' });
  openStockManagement();
}

  document.getElementById('editStateBadge').classList.add('hide'); 
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.add('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';
  
  const { data: ordersData } = await client.from('orders').select('*').eq('atom_code', atom).order('order_date', { ascending: false });
  historyOrders = ordersData || []; 

  if(historyOrders.length > 0) {
    const orderIds = historyOrders.map(o => o.id);
    const { data: itemsData } = await client.from('order_items').select('*').in('order_id', orderIds);
    const allItems = itemsData || [];

    historyOrders.forEach(o => {
      let sSum = 0; let gSum = 0; let resSum = 0; let scrSum = 0;
      const oItems = allItems.filter(it => it.order_id === o.id);
      oItems.forEach(it => {
        const pObj = products.find(x => x.id == it.product_id);

        const rowRes = getLiveRowAmounts(pObj, Number(it.qty || 0), Number(it.price || 0), Number(it.gift_qty || 0), Number(parsedReturn.qty || 0), parsedReturn.handle);
        sSum += rowRes.saleAmount; 
        gSum += rowRes.giftAmount; 
        resSum += rowRes.restoreAmount; 
        scrSum += rowRes.scrapAmount;
      });
      o.skuCount = oItems.length;
      o.saleSum = sSum; 
      o.giftSum = gSum; 
      o.restoreSum = resSum; 
      o.scrapSum = scrSum;
      o.netRevenue = sSum - scrSum - gSum;

  renderHistory();
}

async function deleteExistingOrder(orderId, rawItemsEncoded) {
  if (!confirm("确定要删除这笔订单吗？")) return;

  const listEl = document.getElementById('list');
  const isFromReport = listEl.getAttribute('data-from-report') === 'true';
  listEl.innerHTML = '<div style="color:#756676;padding:10px;">正在删除...</div>';

  try {
    const items = JSON.parse(decodeURIComponent(rawItemsEncoded));

    const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
    const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_id] = st.stock_qty || 0; });

    const stockUpdates = [];
    items.forEach(it => {
      const parsedReturn = parseReturnHandleText(it.return_handle);
      const pObj = products.find(x => x.id == it.product_id);
      if (!pObj) return;

      const isOreoSpecial = isSpecialSpecOreo(pObj);
      const specBox = isOreoSpecial ? (pObj.pcs_per_box || 6) : 1;

      const saleBags = isOreoSpecial ? (Number(it.qty || 0) * specBox) : Number(it.qty || 0);
      const giftBags = Number(it.gift_qty || 0);
      const returnBags = Number(parsedReturn.qty || 0);

      let oldNetImpact = saleBags + giftBags;
      if (parsedReturn.handle === 'RESTORE') {
        oldNetImpact -= returnBags;
      }

      const restoredStock = Number(liveStockMap[it.product_id] || 0) + oldNetImpact;
      stockUpdates.push({
        employee_code: currentEmployee.code,
        product_id: it.product_id,
        stock_qty: restoredStock
      });
    });

    await client.from('order_items').delete().eq('order_id', orderId);
    await client.from('orders').delete().eq('id', orderId);

    if (stockUpdates.length > 0) {
      await client.from('emp_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_id' });
    }

    if (isFromReport) {
      openSaleReport(selectedReportDate);
    } else {
      openStoreHistory(currentStore.atom, currentStore.name);
    }
  } catch (err) {
    console.error(err);
    alert("❌ 删除失败，请检查网络或重试");
    viewOrderDetail(orderId, selectedReportDate, isFromReport);
  }
}

  }

  const { data: dayOrders } = await client.from('orders')
    .select('*')

  if(!dayOrders || dayOrders.length === 0) {

  let dayTotalSale = 0; let dayTotalGiftAmt = 0; let dayTotalScrapAmt = 0;
  let totalGiftPcs = 0; let totalScrapPcs = 0;
  
  const orderSummaryMap = {};

  dayOrders.forEach(o => {
    const matchStore = stores.find(s => String(s.atom_code).trim() === String(o.atom_code).trim());
    const storeName = matchStore ? matchStore.store_name : `未知门店(${o.atom_code})`;
    
    orderSummaryMap[o.id] = {
      orderId: o.id,
      orderDate: o.order_date,
      atomCode: o.atom_code,
      storeName: storeName,
      sellInAmount: 0,
      netRevenue: 0,
      skuCount: 0
    };
  });

  itemsList.forEach(it => {
    const p = products.find(x => x.id == it.product_id);
    if(!p) return;
    const parsed = parseReturnHandleText(it.return_handle);

    const qtyNum = Number(it.qty || 0);
    const priceNum = Number(it.price || 0);
    const giftQtyNum = Number(it.gift_qty || 0);
    const returnQtyNum = Number(parsed.qty || 0);

    const row = getLiveRowAmounts(p, qtyNum, priceNum, giftQtyNum, returnQtyNum, parsed.handle);

    dayTotalSale += row.saleAmount;
    dayTotalGiftAmt += row.giftAmount;
    if(parsed.handle === 'SCRAP') {
      dayTotalScrapAmt += row.scrapAmount;
      totalScrapPcs += returnQtyNum; 
    }
    totalGiftPcs += giftQtyNum; 

    if(orderSummaryMap[it.order_id]) {
      const targetOrder = orderSummaryMap[it.order_id];
      targetOrder.sellInAmount += row.saleAmount;
      targetOrder.netRevenue += (row.saleAmount - row.giftAmount - (parsed.handle === 'SCRAP' ? row.scrapAmount : 0));
      targetOrder.skuCount += 1;
    }
  });

  let dayNetRevenue = dayTotalSale - dayTotalScrapAmt - dayTotalGiftAmt;
  renderReportHtml(targetDate, dayTotalSale, dayNetRevenue, totalGiftPcs, totalScrapPcs, Object.values(orderSummaryMap));
}

function calculateLiveOrderAmounts() {
  let s = 0; let g = 0; let res = 0; let scr = 0;
  let activeSKUCount = 0;
  products.forEach(p => {
    const item = orderData.items[p.id];
    if(item) {
      if(Number(item.qty || 0) > 0 || Number(item.gift_qty || 0) > 0 || Number(item.return_qty || 0) > 0) {
        activeSKUCount++;
      }
      const rowRes = getLiveRowAmounts(p, Number(item.qty || 0), Number(item.price || 0), Number(item.gift_qty || 0), Number(item.return_qty || 0), item.return_handle);
      s += rowRes.saleAmount; 
      g += rowRes.giftAmount; 
      res += rowRes.restoreAmount; 
      scr += rowRes.scrapAmount;      
    }
  });

  let liveNetRevenue = s - scr - g;

  document.getElementById('liveAmountBanner').innerHTML = `
    <span style="font-size:15px; color:var(--primary);">💵 <strong>实收：${liveNetRevenue.toFixed(1)} 元</strong></span><br>
    SKU数：${activeSKUCount} 款 | 卖进：${s.toFixed(1)} 元<br>
    赠送：${g.toFixed(1)} 元 | 过期：${scr.toFixed(1)} 元
  `;
}

        <div class='item'>
          <div class="item-main-row">
            <div class='prod-info'>
              <div class='prod-name'>${p.spec} ${p.product_name}</div>
              <button id="btn_as_${p.id}" class="btn-aftersale-trigger ${itData.return_qty > 0 || itData.gift_qty > 0 ? 'active' : ''}" onclick="toggleAfterSalePanel('${p.id}')">🔄 收回及赠送</button>
            </div>
            
            <div class='control-group'>
              <div class="picker-wrapper">
                <span class="label-txt">销售:</span>
                <select class="ios-picker" onchange="pickerChangeQty('${p.id}', this.value)">
                  ${makePureQtyOptionsHtml(100, itData.qty)}
                </select>
                <span class="unit-txt">${saleUnitText}</span>
              </div>
              <div class="picker-wrapper">
                <span class="label-txt">单价:</span>
                <select class="ios-picker" onchange="pickerChangePrice('${p.id}', this.value)">
                  ${makePurePriceOptionsHtml(defaultPriceVal, stepPlaces, itData.price)}
                </select>
                <span class="unit-txt">元</span>
              </div>
            </div>
          </div>
          
          <div id="panel_${p.id}" class="aftersale-panel ${itData.showPanel ? '' : 'hide'}">
            <div class="aftersale-row-picks">
              <div class="picker-wrapper" style="flex:1;">
                <span class="label-txt">收回数量:</span>
                <select class="ios-picker" onchange="pickerChangeReturnQty('${p.id}', this.value)">
                  ${makePureQtyOptionsHtml(100, itData.return_qty)}
                </select>
                <span class="unit-txt">个</span>
              </div>

              <div class="picker-wrapper" style="flex:1;">
                <span class="label-txt">赠送:</span>
                <select class="ios-picker" onchange="pickerChangeGiftQty('${p.id}', this.value)">
                  ${makePureQtyOptionsHtml(50, itData.gift_qty)}
                </select>
                <span class="unit-txt">个</span>
              </div>
            </div>

            <div class="aftersale-options">
              <label><input type="radio" name="handle_${p.id}" value="RESTORE" ${itData.return_handle!=='SCRAP'?'checked':''} onchange="setReturnHandle('${p.id}','RESTORE')">🟢 能卖</label>
              <label><input type="radio" name="handle_${p.id}" value="SCRAP" ${itData.return_handle==='SCRAP'?'checked':''} onchange="setReturnHandle('${p.id}','SCRAP')">🔴 过期</label>
            </div>
          </div>
        </div>`;
    }).join('')}
    <button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>
  `;
  calculateLiveOrderAmounts();
}

function initItemState(id) {
  if(!orderData.items[id]){ 
    const p = products.find(x => x.id == id); 
    const isOreoSpecial = isSpecialSpecOreo(p);
    const defaultPriceVal = isOreoSpecial ? 17.5 : (p.default_price || 15);
    orderData.items[id] = { qty: 0, price: defaultPriceVal, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; 
  }
}

function pickerChangeQty(id, value) { initItemState(id); orderData.items[id].qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }

function pickerChangePrice(id, value) { 
  initItemState(id); 
  const targetPrice = parseFloat(value) || 0;
  const currentProd = products.find(x => x.id == id);
  if (!currentProd) return;

  const sameSpecProducts = products.filter(p => p.brand === currentProd.brand && p.spec === currentProd.spec);
  sameSpecProducts.forEach(p => {
    initItemState(p.id);
    orderData.items[p.id].price = targetPrice;
  });

  renderOrder();
}

function pickerChangeGiftQty(id, value) { initItemState(id); orderData.items[id].gift_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function pickerChangeReturnQty(id, value) { initItemState(id); orderData.items[id].return_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function toggleAfterSalePanel(id) { initItemState(id); orderData.items[id].showPanel = !orderData.items[id].showPanel; renderOrder(); }
function setReturnHandle(id, h) { initItemState(id); orderData.items[id].return_handle = h; calculateLiveOrderAmounts(); }
function syncSelectedDate(val){ if(!val) return; orderData.date = val; document.getElementById('dateText').innerText = val; }

async function submitOrder(){
  let grandTotalQty = 0;
  Object.keys(orderData.items).forEach(id => {
    const it = orderData.items[id];
    grandTotalQty += Number(it.qty || 0) + Number(it.gift_qty || 0) + Number(it.return_qty || 0);
  });

  if (grandTotalQty === 0) {
    alert("⚠️ 订单中没有填写任何有效的销售、赠送或收回数量，无法提交空白单据！");
    return;
  }

  const submitBtn = document.querySelector('.float-submit');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '⏳ 提交中...'; }

  const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
  const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_id] = st.stock_qty || 0; });

  const stockUpdates = []; let isStockDeficit = false; 
  const allProdIds = new Set([...Object.keys(orderData.items), ...Object.keys(orderData.oldItemsMap || {})]);

  for (let id of allProdIds) {
    const item = orderData.items[id] || { qty: 0, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE' };
    const oldNetImpact = Number(orderData.oldItemsMap?.[id] || 0); 
    
    const pObj = products.find(x => x.id == id);
    const isOreoSpecial = isSpecialSpecOreo(pObj);
    const specBox = isOreoSpecial ? (pObj.pcs_per_box || 6) : 1;

    const saleBags = isOreoSpecial ? (Number(item.qty || 0) * specBox) : Number(item.qty || 0);
    const giftBags = Number(item.gift_qty || 0);
    const returnBags = Number(item.return_qty || 0);

    let currentNetImpact = saleBags + giftBags; 
    if (item.return_handle === 'RESTORE') {
      currentNetImpact -= returnBags; 
    }

    const delta = currentNetImpact - oldNetImpact; 
    const finalNewStock = Number(liveStockMap[id] || 0) - delta;

    if (finalNewStock < 0) isStockDeficit = true;
    if (delta !== 0 || Number(item.qty || 0) > 0 || Number(item.return_qty || 0) > 0 || Number(item.gift_qty || 0) > 0) {
      stockUpdates.push({ employee_code: currentEmployee.code, product_id: id, stock_qty: finalNewStock });
    }
  }

  const formattedItems = [];
  Object.keys(orderData.items).forEach(id => { 
    const it = orderData.items[id]; 
    if(Number(it.qty || 0) > 0 || Number(it.return_qty || 0) > 0 || Number(it.gift_qty || 0) > 0){ 
      const textValue = `${it.return_qty || 0}_${it.return_handle}`;
      formattedItems.push({ 
        product_id: id, qty: Number(it.qty || 0), price: Number(it.price || 0), gift_qty: Number(it.gift_qty || 0), return_handle: textValue 
      }); 
    } 
  });

  if (orderData.id) {
    await client.from('orders').update({ order_date: orderData.date }).eq('id', orderData.id);
    await client.from('order_items').delete().eq('order_id', orderData.id);
    formattedItems.forEach(fit => fit.order_id = orderData.id);
    await client.from('order_items').insert(formattedItems); 
  } else {
    const { data: o } = await client.from('orders').insert({ employee_code: currentEmployee.code, atom_code: orderData.atom, order_date: orderData.date }).select().single();
    formattedItems.forEach(fit => fit.order_id = o.id);
    await client.from('order_items').insert(formattedItems); 
  }

  if (stockUpdates.length > 0) await client.from('emp_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_id' });
  if (isStockDeficit) alert('提交成功，但可用库存出现负数，请注意及时补充！');
  
  orderData = null; 
  document.getElementById('editStateBadge').classList.add('hide');
  openStoreHistory(currentStore.atom, currentStore.name);
}

function goBack(){
  document.getElementById('editStateBadge').classList.add('hide'); 
  if(STATE === 'STOCK' || STATE === 'REPORT') {
    orderData = null;
    renderStores(); 
  }
  else if(STATE === 'DETAIL') {
    const isFromReport = document.getElementById('list').getAttribute('data-from-report') === 'true';
    if(isFromReport) {
      openSaleReport(selectedReportDate);
    } else {
      renderHistory();
    }
  }
  else if(STATE === 'ORDER') {
    if(orderData?.id) {
      const savedId = orderData.id;
      const savedDate = orderData.date;
      const isFromReport = document.getElementById('list').getAttribute('data-from-report') === 'true';
      orderData = null; 
      viewOrderDetail(savedId, savedDate, isFromReport);
    } else {
      orderData = null;
      renderHistory();
    }
  }
  else if(STATE === 'HISTORY') {
    orderData = null;
    renderStores(); 
  }
  else if(STATE === 'STORE') {
    orderData = null;
    renderEmployees();
  }
}

init();
</script>
</body></html>
