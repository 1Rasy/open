<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>门店系统（生产版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:20px; background:#f5f5f5; }
    .card { background:#fff; padding:15px; border-radius:10px; }
    .item { padding:12px; border-bottom:1px solid #eee; cursor:pointer; }
    .item:hover { background:#f0f7ff; }
    input { width:100%; padding:10px; margin-bottom:10px; }
    .back { color:#1677ff; cursor:pointer; display:none; margin-bottom:10px; }
    .sub { font-size:12px; color:#888; }
    .warn { color:red; font-size:12px; }
    button { background:#1677ff; color:#fff; border:none; padding:6px 10px; border-radius:6px; }
  </style>
</head>

<body>

<h2>📦 门店系统（上线版）</h2>

<div class="card">

  <input id="search" placeholder="搜索员工..." oninput="renderEmployees()" />

  <div id="back" class="back" onclick="back()">← 返回</div>

  <div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
  "https://mnmzqmqxdzagpounvchn.supabase.co",
  "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF"
);

let employees = [];

// ================== 1. 只加载员工 ==================
async function loadEmployees() {

  const { data, error } = await client
    .from("employees")
    .select("*");

  if (error) {
    alert(error.message);
    return;
  }

  employees = data || [];

  renderEmployees();
}

// ================== 2. 首页 ==================
function renderEmployees() {

  document.getElementById("back").style.display = "none";

  const key = document.getElementById("search").value || "";

  const list = employees.filter(e =>
    (e.employee_name || "").includes(key) ||
    (e.employee_code || "").includes(key)
  );

  document.getElementById("list").innerHTML = list.map(e => `
    <div class="item" onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
      ${e.employee_name}
      <div class="sub">${e.employee_code}</div>
    </div>
  `).join("");
}

// ================== 3. 点击员工（核心优化） ==================
async function openEmployee(code, name) {

  document.getElementById("back").style.display = "block";

  document.getElementById("list").innerHTML = `
    <div>加载中...</div>
  `;

  // 🔥 关键：只查这个员工的关系
  const { data: links, error } = await client
    .from("employee_stores")
    .select("atom_code")
    .eq("employee_code", code);

  if (error) {
    document.getElementById("list").innerHTML = `<div class="warn">${error.message}</div>`;
    return;
  }

  if (!links || links.length === 0) {
    document.getElementById("list").innerHTML = `<div class="warn">该员工暂无门店</div>`;
    return;
  }

  const atomCodes = links.map(l => l.atom_code);

  // 🔥 再查门店表（IN查询）
  const { data: stores, error: err2 } = await client
    .from("stores_dim")
    .select("*")
    .in("atom_code", atomCodes);

  if (err2) {
    document.getElementById("list").innerHTML = `<div class="warn">${err2.message}</div>`;
    return;
  }

  document.getElementById("list").innerHTML = `
    <h3>${name}</h3>

    ${stores.map(s => `
      <div class="item">
        ${s.store_name}
        <div class="sub">${s.atom_code}</div>
        <button onclick="openOrder('${s.atom_code}')">开单</button>
      </div>
    `).join("")}
  `;
}

// ================== 4. 返回 ==================
function back() {
  renderEmployees();
}

// ================== 5. 开单 ==================
function openOrder(atom) {
  alert("开单：" + atom);
}

loadEmployees();

</script>

</body>
</html>
