<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>门店库存&开单系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 10px; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      flex: 1;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn {
      background: #1677ff;
      color: white;
    }

    .btn:hover {
      background: #0f5bd6;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    .item:hover {
      background: #f0f7ff;
    }

    .back {
      margin-bottom: 10px;
      display: inline-block;
      cursor: pointer;
      color: #1677ff;
    }
  </style>
</head>

<body>

<h1>📦 门店库存 & 开单系统</h1>

<div class="card">

  <!-- 搜索 -->
  <div class="row">
    <input id="search" placeholder="搜索员工..." oninput="renderEmployees()" />
    <button class="btn" onclick="loadData()">刷新</button>
  </div>

  <!-- 返回按钮 -->
  <div id="backBtn" style="display:none" class="back" onclick="backToEmployees()">
    ← 返回员工列表
  </div>

  <!-- 列表 -->
  <div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
  const SUPABASE_ANON_KEY = "你的anon_key";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let rawData = [];
  let currentEmployee = null;

  // ===== 1. 拉数据 =====
  async function loadData() {
    const { data, error } = await client
      .from("stores")
      .select("*");

    if (error) {
      alert("加载失败：" + error.message);
      return;
    }

    rawData = data;
    renderEmployees();
  }

  // ===== 2. 首页：员工列表 =====
  function renderEmployees() {
    currentEmployee = null;
    document.getElementById("backBtn").style.display = "none";

    const keyword = document.getElementById("search").value || "";

    // 去重员工
    const map = new Map();

    rawData.forEach(row => {
      if (!map.has(row.employee_code)) {
        map.set(row.employee_code, {
          employee_code: row.employee_code,
          employee_name: row.employee_name
        });
      }
    });

    let list = Array.from(map.values());

    // 搜索过滤
    list = list.filter(e =>
      e.employee_name.includes(keyword) ||
      e.employee_code.includes(keyword)
    );

    const html = list.map(e => `
      <div class="item" onclick="openEmployee('${e.employee_code}', '${e.employee_name}')">
        <span>${e.employee_name}</span>
        <span style="color:#999">${e.employee_code}</span>
      </div>
    `).join("");

    document.getElementById("list").innerHTML = html;
  }

  // ===== 3. 进入员工 → 门店列表 =====
  function openEmployee(code, name) {
    currentEmployee = code;
    document.getElementById("backBtn").style.display = "block";

    const stores = rawData.filter(r => r.employee_code === code);

    const html = `
      <h3>👤 ${name}</h3>
      ${stores.map(s => `
        <div class="item">
          <span>
            ${s.store_name}
            <div style="font-size:12px;color:#999">${s.atom_code}</div>
          </span>
          <button class="btn" onclick="openOrder('${s.atom_code}')">开单</button>
        </div>
      `).join("")}
    `;

    document.getElementById("list").innerHTML = html;
  }

  // ===== 4. 返回 =====
  function backToEmployees() {
    renderEmployees();
  }

  // ===== 5. 开单 =====
  function openOrder(atom_code) {
    alert("进入开单：" + atom_code);
  }

  loadData();
</script>

</body>
</html>
