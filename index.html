<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>系统Debug终极版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 20px; background:#f5f5f5; }
    .card { background:#fff; padding:15px; border-radius:10px; }
    .item { padding:12px; border-bottom:1px solid #eee; cursor:pointer; }
    .item:hover { background:#f0f7ff; }
    input { width:100%; padding:10px; margin-bottom:10px; }
    .back { color:#1677ff; cursor:pointer; display:none; margin-bottom:10px; }
    .warn { color:red; font-size:13px; margin:5px 0; }
    .ok { color:green; font-size:13px; margin:5px 0; }
    .sub { font-size:12px; color:#888; }
  </style>
</head>

<body>

<h2>📦 Debug终极测试版</h2>

<div class="card">

  <input id="search" placeholder="搜索员工..." oninput="renderEmployees()" />

  <div id="status"></div>

  <div id="back" class="back" onclick="back()">← 返回</div>

  <div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
  "https://mnmzqmqxdzagpounvchn.supabase.co",
  "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF"
);

let employees = [];
let stores = [];
let relations = [];

// ================== 1. 加载数据 ==================
async function loadData() {

  const e = await client.from("employees").select("*");
  const s = await client.from("stores_dim").select("*");
  const r = await client.from("employee_stores").select("*");

  employees = e.data || [];
  stores = s.data || [];
  relations = r.data || [];

  // ===== 超级关键 debug =====
  console.log("=== API RAW RESULT ===");
  console.log("employees:", e);
  console.log("stores_dim:", s);
  console.log("employee_stores:", r);

  document.getElementById("status").innerHTML = `
    <div class="ok">employees: ${employees.length}</div>
    <div class="ok">stores_dim: ${stores.length}</div>
    <div class="warn">relations: ${relations.length}</div>
  `;

  renderEmployees();
}

// ================== 2. 员工列表 ==================
function renderEmployees() {

  document.getElementById("back").style.display = "none";

  const keyword = document.getElementById("search").value || "";

  const list = employees.filter(e =>
    (e.employee_name || "").includes(keyword) ||
    (e.employee_code || "").includes(keyword)
  );

  document.getElementById("list").innerHTML = list.map(e => `
    <div class="item" onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
      ${e.employee_name}
      <div class="sub">${e.employee_code}</div>
    </div>
  `).join("");
}

// ================== 3. 点员工 ==================
function openEmployee(code, name) {

  document.getElementById("back").style.display = "block";

  console.log("=== CLICK ===", code);

  console.log("ALL relations RAW:", relations);

  const links = relations.filter(r => r.employee_code === code);

  console.log("FILTERED links:", links);

  const list = links.map(l => {

    const store = stores.find(s =>
      String(s.atom_code) === String(l.atom_code)
    );

    if (!store) {
      console.log("❌ missing store:", l.atom_code);
    }

    return store;
  }).filter(Boolean);

  console.log("FINAL STORES:", list);

  document.getElementById("list").innerHTML = `
    <h3>${name}</h3>

    ${links.length === 0 ? `<div class="warn">⚠️ relations为空（问题就在这里）</div>` : ""}

    ${list.length === 0 && links.length > 0 ? `<div class="warn">⚠️ 有关系但找不到门店</div>` : ""}

    ${list.map(s => `
      <div class="item">
        ${s.store_name}
        <div class="sub">${s.atom_code}</div>
      </div>
    `).join("")}
  `;
}

// ================== 4. 返回 ==================
function back() {
  renderEmployees();
}

loadData();

</script>

</body>
</html>
