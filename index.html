<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>门店开单系统 V4（标准结构）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 { margin-bottom: 10px; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .item:hover {
      background: #f0f7ff;
    }

    .btn {
      background: #1677ff;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .back {
      color: #1677ff;
      cursor: pointer;
      margin-bottom: 10px;
      display: none;
    }

    .sub {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<h2>📦 门店开单系统 V4（标准版）</h2>

<div class="card">

  <input id="search" placeholder="搜索员工 / 门店..." oninput="renderEmployees()" />

  <div id="back" class="back" onclick="back()">← 返回员工列表</div>

  <div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
  "https://mnmzqmqxdzagpounvchn.supabase.co",
  "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF"
);

let employees = [];
let stores = [];
let relations = [];

// ================== 1. 拉取三张表 ==================
async function loadData() {

  const e = await client.from("employees").select("*");
  const s = await client.from("stores_dim").select("*");
  const r = await client.from("employee_stores").select("*");

  employees = e.data || [];
  stores = s.data || [];
  relations = r.data || [];

  console.log("employees:", employees.length);
  console.log("stores:", stores.length);
  console.log("relations:", relations.length);

  renderEmployees();
}

// ================== 2. 首页：员工列表 ==================
function renderEmployees() {
  document.getElementById("back").style.display = "none";

  const keyword = document.getElementById("search").value || "";

  let list = employees.filter(e =>
    (e.employee_name || "").includes(keyword) ||
    (e.employee_code || "").includes(keyword)
  );

  document.getElementById("list").innerHTML = list.map(e => `
    <div class="item" onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
      👤 ${e.employee_name}
      <div class="sub">${e.employee_code}</div>
    </div>
  `).join("");
}

// ================== 3. 点员工 → 门店 ==================
function openEmployee(code, name) {

  document.getElementById("back").style.display = "block";

  const links = relations.filter(r => r.employee_code === code);

  const list = links.map(l => {
    return stores.find(s => s.atom_code === l.atom_code);
  }).filter(Boolean);

  document.getElementById("list").innerHTML = `
    <h3>👤 ${name}</h3>

    ${list.map(s => `
      <div class="item">
        🏪 ${s.store_name}
        <div class="sub">${s.atom_code}</div>
        <button class="btn" onclick="openOrder('${s.atom_code}')">开单</button>
      </div>
    `).join("")}
  `;
}

// ================== 4. 返回 ==================
function back() {
  renderEmployees();
}

// ================== 5. 开单 ==================
function openOrder(atom) {
  alert("进入开单：" + atom);
}

loadData();

</script>

</body>
</html>
