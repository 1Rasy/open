<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>门店库存&开单系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 10px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn {
      background: #1677ff;
      color: white;
    }
    .btn:hover {
      background: #0f5bd6;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      flex: 1;
    }
  </style>
</head>

<body>

<h1>📦 门店库存 & 开单系统</h1>

<div class="card">
  <h3>门店 / 员工列表</h3>

  <div class="row">
    <input id="search" placeholder="搜索门店或员工..." />
    <button class="btn" onclick="loadData()">刷新</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ATOM编码</th>
        <th>门店名称</th>
        <th>员工工号</th>
        <th>员工姓名</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>功能入口（后续扩展）</h3>
  <button class="btn">➕ 新建开单</button>
  <button class="btn">📊 库存管理</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ====== 1. Supabase 初始化 ======
  const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co/rest/v1/";
  const SUPABASE_ANON_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ====== 2. 加载数据 ======
  async function loadData() {
    const search = document.getElementById("search").value;

    let query = client
      .from("your_table_name")  // ← 改成你的表名
      .select("*");

    const { data, error } = await query;

    if (error) {
      alert("加载失败：" + error.message);
      return;
    }

    renderTable(data);
  }

  // ====== 3. 渲染表格 ======
  function renderTable(data) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach(row => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row.atom_code || ""}</td>
        <td>${row.store_name || ""}</td>
        <td>${row.employee_code || ""}</td>
        <td>${row.employee_name || ""}</td>
        <td>
          <button class="btn" onclick="openOrder('${row.atom_code}')">开单</button>
        </td>
      `;

      tbody.appendChild(tr);
    });
  }

  // ====== 4. 开单入口（后面你要做核心） ======
  function openOrder(atom_code) {
    alert("进入开单页面，门店：" + atom_code);
    // 后面可以跳转：
    // window.location.href = "order.html?atom=" + atom_code;
  }

  // 初始加载
  loadData();
</script>

</body>
</html>
