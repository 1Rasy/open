<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>调试版门店系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .item:hover {
      background: #f0f7ff;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 6px 10px;
      background: #1677ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .back {
      color: #1677ff;
      cursor: pointer;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>

<body>

<h2>📦 调试版门店系统</h2>

<div class="card">
  <input id="search" placeholder="搜索员工..." oninput="renderEmployees()" />
  <button class="btn" onclick="loadData()">刷新</button>

  <div id="back" class="back" onclick="back()">← 返回员工列表</div>

  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let rawData = [];

  // ===== 1. 拉数据 =====
  async function loadData() {
    const { data, error } = await client
      .from("stores")
      .select("*")
      .limit(10000);

    if (error) {
      alert("错误：" + error.message);
      return;
    }

    rawData = data || [];

    // 🔥 关键调试信息
    console.log("=== TOTAL ROWS ===", rawData.length);
    console.log("=== SAMPLE ===", rawData.slice(0, 5));
    console.log("=== KEYS ===", Object.keys(rawData[0] || {}));

    renderEmployees();
  }

  // ===== 2. 员工列表（不去重版本）=====
  function renderEmployees() {
    document.getElementById("back").style.display = "none";

    const keyword = document.getElementById("search").value || "";

    const list = rawData.filter(r => {
      return (
        (r.employee_name || "").includes(keyword) ||
        (r.employee_code || "").includes(keyword)
      );
    });

    document.getElementById("list").innerHTML = list.map(r => `
      <div class="item" onclick="openEmployee('${r.employee_code}', '${r.employee_name}')">
        👤 ${r.employee_name || "NULL"} 
        <div style="font-size:12px;color:#999">
          ${r.employee_code || "NO CODE"} ｜ ${r.store_name || ""}
        </div>
      </div>
    `).join("");
  }

  // ===== 3. 进入员工 =====
  function openEmployee(code, name) {
    document.getElementById("back").style.display = "block";

    const stores = rawData.filter(r => r.employee_code === code);

    document.getElementById("list").innerHTML = `
      <h3>👤 ${name}</h3>
      ${stores.map(s => `
        <div class="item">
          🏪 ${s.store_name}
          <div style="font-size:12px;color:#999">${s.atom_code}</div>
          <button class="btn" onclick="openOrder('${s.atom_code}')">开单</button>
        </div>
      `).join("")}
    `;
  }

  function back() {
    renderEmployees();
  }

  function openOrder(atom) {
    alert("开单：" + atom);
  }

  loadData();
</script>

</body>
</html>
