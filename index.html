<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>开单+库存(iOS滚轮修正版)</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root {
  --primary: #4A154B;        
  --primary-hover: #360f37; 
  --accent: #ffb81c;        
  --bg-main: #f4f2f5;       
  --text-main: #1f1121;     
  --text-muted: #756676;    
  --card-bg: #ffffff;       
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
.card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); position: relative;}
.top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; transition: all 0.2s; }
.back-btn:active { background: #e2dde3; transform: scale(0.97); }
.back-btn::before { content: "←"; margin-right: 6px; font-weight: bold; font-size: 16px; }
.editing-badge { font-size:12px; color:#e6a23c; background:#fff7eb; padding:6px 12px; border-radius:14px; font-weight:bold; border: 1px solid #f5dab1; }
#list { width: 100%; }
.big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; letter-spacing: -0.5px; }
.emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 0; }
.emp-card { background: #faf9fa; border: 1px solid #eeeade; border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 12px; cursor: pointer; transition: all 0.15s ease; box-sizing: border-box; }
.emp-card:active { background: #f3e2f5; transform: scale(0.97); }
.store-container { padding-right: 24px; box-sizing: border-box; }
.letter-group-title { background: #f4f2f5; color: var(--primary); font-weight: 700; font-size: 14px; padding: 4px 8px; margin: 12px 0 6px 0; border-radius: 4px; }
.item { padding:14px 4px; border-bottom:1px solid #f4f2f5; box-sizing: border-box; width: 100%; }
.item-main-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.prod-info { flex: 1; min-width: 0; }
.prod-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.control-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.picker-wrapper { display: flex; align-items: center; gap: 2px; font-size: 13px; color: var(--text-muted); }
.ios-picker {
  background: #f4f2f5;
  color: var(--text-main);
  border: 1px solid #dcd6dd;
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 14px;
  font-weight: 700;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none; 
  appearance: none;
  text-align: center;
  min-width: 50px;
}
.ios-picker:focus { border-color: var(--primary); background: #fff; }

.aftersale-panel { background: #fdfaf6; border: 1px dashed #f5dab1; border-radius: 6px; padding: 10px; margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
.aftersale-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
.aftersale-options { display: flex; gap: 12px; margin-top: 4px;}
.aftersale-options label { display: flex; align-items: center; gap: 4px; font-weight: 600; cursor: pointer; font-size: 13px; }
.btn-stock-gate { background: linear-gradient(135deg, var(--primary), #6b266c); color: #fff; padding: 14px; width: 100%; border-radius: 10px; font-size: 15px; font-weight: 700; margin-bottom: 16px; text-align: center; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(74,21,75,0.15);}
.btn-new-order { background: var(--primary); color:#fff; padding:12px; width:100%; border-radius:8px; font-size: 16px; font-weight:600; margin-bottom:15px; text-align:center;}
.smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; font-weight: 500; cursor: pointer;}
.date-picker-wrapper { position: relative; display: inline-block; }
.real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
.search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
.search-wrapper input { width:100%; padding:12px 40px 12px 12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa;}
.search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff;}
.search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }
.search-clear-btn:active { background: #d0c9d2; }
.btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-weight: bold; font-size: 11px; padding: 4px 6px; border-radius: 4px; }
.btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }
.brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }
.brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }
.brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }
.spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }
.spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500;}
.spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }
.brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }
.sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }
.hide { display:none !important; }
.history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
.float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }
.stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box;}
.stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
.stock-dir-select { padding: 5px 8px; background: #fff; border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }
.alphabet-sidebar { position: fixed; right: 16px; top: 140px; bottom: 100px; width: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; background: rgba(255, 255, 255, 0.85); border-radius: 12px; box-shadow: 0 2px 8px rgba(74,21,75,0.08); border: 1px solid #eeeade; user-select: none; -webkit-user-select: none; }
.alphabet-letter { font-size: 11px; font-weight: 700; color: var(--primary); padding: 3px 0; width: 100%; text-align: center; cursor: pointer; }
.alphabet-letter:active { color: var(--accent); transform: scale(1.3); }
.amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; color: #2b1d2c; }
.amount-summary-banner strong { font-size: 15px; }
</style>
</head>
<body>

<div class="card">
<div id="searchBlock" class="search-wrapper">
  <input id="search" placeholder="快速搜索..." oninput="handleSearch()" />
  <div id="clearSearch" class="search-clear-btn" onclick="clearSearchInput()">✕</div>
</div>
<div class="top-action-bar">
  <div id="back" class="back-btn hide" onclick="goBack()">返回</div>
  <div id="editStateBadge" class="editing-badge hide">正在修改历史单据</div>
</div>
<div id="list"></div>
<div id="alphabetSidebar" class="alphabet-sidebar hide"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

<script>
const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let STATE = "EMP"; 
let employees = [];
let stores = []; 
let products = [];
let currentEmployee = null;
let currentStore = null; 
let orderData = null; 
let currentSelectedBrand = null; 
let currentSelectedSpec = "ALL"; 
let historyOrders = []; 
let stockData = {}; 

// 🎯 规则配置
const BOX_SALE_OREO_IDS = [19, 20];          // 20和21号：开单销售单位为中盒，售后/赠送/库存为包
const DOUBLE_DECIMAL_PRICE_IDS = [49,50,51,52,53,54,55];   // 两位小数特有商品ID规则（在这里加你需要两位小数的ID，跟20,21解耦）

// 辅助函数：根据商品ID判定价格在滚轮中渲染几位小数
function getPriceDecimalPlaces(prodId) {
  return DOUBLE_DECIMAL_PRICE_IDS.includes(Number(prodId)) ? 2 : 1;
}

// 辅助函数：开单金额高精度折算逻辑
function getLiveRowAmounts(prodId, qty, price, giftQty, returnQty) {
  let saleAmount = 0;
  let giftAmount = 0;
  let returnAmount = 0;

  if (BOX_SALE_OREO_IDS.includes(Number(prodId))) {
    // 20、21号特殊处理：销售按整盒(默认17.5)，赠送和售后按拆包(17.5 / 11)
    const singleBagPrice = 17.5 / 11;
    saleAmount = qty * price; 
    giftAmount = giftQty * singleBagPrice;
    returnAmount = returnQty * singleBagPrice;
  } else {
    // 普通商品：销售、赠送、售后全部统一按最小单位计价
    saleAmount = qty * price;
    giftAmount = giftQty * price;
    returnAmount = returnQty * price;
  }

  return { saleAmount, giftAmount, returnAmount };
}

function parseReturnHandleText(val) {
  if (!val || typeof val !== 'string' || !val.includes('_')) {
    return { qty: 0, handle: 'RESTORE' };
  }
  const parts = val.split('_');
  return { qty: parseInt(parts[0]) || 0, handle: parts[1] || 'RESTORE' };
}

async function init(){
  const e = await client.from('employees').select('*');
  const p = await client.from('products').select('*');
  employees = e.data || [];
  products = (p.data || []).map(x => ({ ...x, spec: (x.spec || '常规款').trim() }));
  renderEmployees();
}

function handleSearch(){
  const val = document.getElementById('search').value;
  const clearBtn = document.getElementById('clearSearch');
  if(val && val.length > 0) clearBtn.style.display = 'block';
  else clearBtn.style.display = 'none';

  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function autoResetSearchState() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
}

function clearSearchInput() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function getSearch(){ return document.getElementById('search').value || ''; }

function renderEmployees(){
  STATE = 'EMP';
  document.getElementById('back').classList.add('hide');
  document.getElementById('editStateBadge').classList.add('hide'); 
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入姓名或工号搜索员工...";

  const k = getSearch();
  const list = employees.filter(e=> (e.employee_name||'').includes(k) || (e.employee_code||'').includes(k) );

  document.getElementById('list').innerHTML = `
    <div class="emp-grid">
      ${list.map(e=>`
        <div class='emp-card' onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
          <strong style="font-size:16px; color:var(--primary); display:block; margin-bottom:4px;">${e.employee_name}</strong>
          <div class='sub' style="font-size:12px;">${e.employee_code}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function openEmployee(code, name){
  autoResetSearchState();
  STATE = 'STORE';
  currentEmployee = {code, name};
  // 🛠️ 已经彻底修正该处的 .classList 语法错误，点击可正常载入并跳转门店
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">📊 正在载入负责门店档案...</div>';

  const r = await client.from('employee_stores').select('atom_code').eq('employee_code', code);
  const codes = (r.data || []).map(i => String(i.atom_code).trim());

  if (codes.length === 0) {
    document.getElementById('alphabetSidebar').classList.add('hide');
    document.getElementById('alphabetSidebar').innerHTML = '';
    document.getElementById('list').innerHTML = `
      <button class="btn-stock-gate" onclick="openStockManagement()">📦 库存管理</button>
      <div style='font-size:14px; font-weight:700; color:var(--primary); margin: 6px 0 14px 4px;'>门店总数：0 家</div>
      <div class="sub" style="text-align:center;padding:20px;color:red;">⚠️ 该员工未绑定任何门店</div>`;
    return;
  }

  const { data: matchedStores } = await client.from('stores_dim').select('*').in('atom_code', codes);
  stores = (matchedStores || []).sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));
  renderStores();
}

function getStoreFirstLetter(storeName) {
  if (!storeName) return '#';
  try {
    const firstChar = storeName.trim().charAt(0);
    const pinyin = pinyinPro.pinyin(firstChar, { pattern: 'first', toneType: 'none' });
    if (pinyin && pinyin.length > 0) {
      const letter = pinyin.charAt(0).toUpperCase();
      if (/[A-Z]/.test(letter)) return letter;
    }
  } catch (e) { console.error(e); }
  return '#';
}

function renderStores(){
  STATE = 'STORE';
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入门店名称或编码搜索店铺...";

  const k = getSearch();
  const f = stores.filter(s=> (s.store_name||'').includes(k) || (s.atom_code||'').includes(k) );

  const groupedStores = {};
  const activeLetters = new Set();

  f.forEach(s => {
    const letter = getStoreFirstLetter(s.store_name);
    if (!groupedStores[letter]) groupedStores[letter] = [];
    groupedStores[letter].push(s);
    activeLetters.add(letter);
  });

  const sortedLetters = Array.from(activeLetters).sort();
  const sidebarEl = document.getElementById('alphabetSidebar');
  
  if (sortedLetters.length > 1 && !k && f.length > 10) { 
    sidebarEl.classList.remove('hide');
    sidebarEl.innerHTML = sortedLetters.map(l => `<div class="alphabet-letter" onclick="scrollToLetterGroup('${l}')">${l}</div>`).join('');
  } else {
    sidebarEl.classList.add('hide'); sidebarEl.innerHTML = '';
  }

  let listHtml = `
    <button class="btn-stock-gate" onclick="openStockManagement()">📦 库存管理</button>
    <div style='font-size:14px; font-weight:700; color:var(--primary); margin: 0 0 14px 4px;'>门店总数：${stores.length} 家</div>
    <div class="store-container">
  `;

  if (sortedLetters.length === 0) {
    listHtml += `<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;
  } else {
    sortedLetters.forEach(letter => {
      listHtml += `<div id="group_letter_${letter}" class="letter-group-title">${letter}</div>`;
      groupedStores[letter].forEach(s => {
        listHtml += `
          <div class='item' onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">
            <div class="item-main-row">
              <div>
                <strong style="font-size:16px;color:var(--primary);">${s.store_name}</strong>
                <div class='sub'>${s.atom_code}</div>
              </div>
            </div>
          </div>
        `;
      });
    });
  }
  listHtml += `</div>`;
  document.getElementById('list').innerHTML = listHtml;
}

function scrollToLetterGroup(letter) {
  const target = document.getElementById(`group_letter_${letter}`);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function openStockManagement(){
  STATE = 'STOCK';
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('alphabetSidebar').innerHTML = '';
  document.getElementById('searchBlock').classList.add('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">📦 正在同步仓库实时库存...</div>';

  const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
  const stockMap = {};
  (currentStocks || []).forEach(st => { stockMap[st.product_id] = st.stock_qty || 0; });

  stockData = { emp_code: currentEmployee.code, currentStockMap: stockMap, additions: {} };

  if(!currentSelectedBrand) {
    const brands = [...new Set(products.map(p => p.brand))];
    currentSelectedBrand = brands.length > 0 ? brands[0] : null;
    currentSelectedSpec = "ALL";
  }
  renderStockPage();
}

function generateFilterHeaderHtml() {
  const brands = [...new Set(products.map(p => p.brand))];
  if (!currentSelectedBrand && brands.length > 0) currentSelectedBrand = brands[0];
  const availableSpecs = [...new Set(products.filter(p => p.brand === currentSelectedBrand).map(p => p.spec))];
  if (currentSelectedSpec !== "ALL" && !availableSpecs.includes(currentSelectedSpec)) currentSelectedSpec = "ALL";

  return `
    <div class='brand-nav'>
      ${brands.map(b => `<div class="brand-badge ${b === currentSelectedBrand ? 'active' : ''}" onclick="selectBrand('${b}')">${b}</div>`).join('')}
    </div>
    <div class='spec-nav'>
      <div class="spec-badge ${currentSelectedSpec === 'ALL' ? 'active' : ''}" onclick="selectSpec('ALL')">全部规格</div>
      ${availableSpecs.map(sp => `<div class="spec-badge ${currentSelectedSpec === sp ? 'active' : ''}" onclick="selectSpec('${sp}')">${sp}</div>`).join('')}
    </div>
    <div class='brand'>📂 筛选结果：${currentSelectedBrand || '未选择'} ➔ ${currentSelectedSpec === 'ALL' ? '全部规格' : currentSelectedSpec}</div>
  `;
}

function selectBrand(brandName) { currentSelectedBrand = brandName; currentSelectedSpec = "ALL"; if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); }
function selectSpec(specName) { currentSelectedSpec = specName; if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); }

function makeQtyOptionsHtml(max, current, suffix = '') {
  let html = '';
  for(let i=0; i<=max; i++) {
    html += `<option value="${i}" ${i === current ? 'selected' : ''}>${i}${suffix}</option>`;
  }
  return html;
}

// 🎯 两位小数按“五分钱（0.05）”为刻度跳跃，一位小数按“一毛钱（0.1）”跳跃
function makePriceOptionsHtml(centerPrice, stepPlaces, currentSelected) {
  let html = '';
  let start = Math.max(0.1, centerPrice - 15);
  let end = centerPrice + 30;
  let step = stepPlaces === 2 ? 0.05 : 0.1; 
  
  for (let p = start; p <= end; p += step) {
    let val = +p.toFixed(stepPlaces);
    html += `<option value="${val}" ${Math.abs(val - currentSelected) < 0.005 ? 'selected' : ''}>${val.toFixed(stepPlaces)}元</option>`;
  }
  return html;
}

function renderStockPage(){
  STATE = 'STOCK';
  document.getElementById('back').classList.remove('hide');
  const displayProducts = products.filter(p => p.brand === currentSelectedBrand && (currentSelectedSpec === "ALL" ? true : p.spec === currentSelectedSpec));

  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:700;color:var(--primary); font-size:15px;'>🏢 主体：${currentEmployee.name}</div>
    ${generateFilterHeaderHtml()}
    ${displayProducts.map(p => {
      const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(p.id));
      const specCase = p.pcs_per_case || 24; 
      const specBox = p.pcs_per_box || 0;    
      const totalPcs = stockData.currentStockMap[p.id] || 0; 

      let displayCases = Math.floor(totalPcs / specCase);
      let displayBoxes = 0; let displayPcs = totalPcs % specCase;
      if (specBox > 0) {
        let remPcs = totalPcs % specCase;
        displayBoxes = Math.floor(remPcs / specBox); displayPcs = remPcs % specBox;
      }

      const currentDir = stockData.additions[p.id]?.dir || 'plus';
      const curC = stockData.additions[p.id]?.cases || 0;
      const curB = stockData.additions[p.id]?.boxes || 0;
      const curP = stockData.additions[p.id]?.pcs || 0;

      return `
        <div class="stock-row">
          <div style="font-weight:600; font-size:15px; color:var(--primary);">${p.spec} ${p.product_name}</div>
          <div style="font-size:13px; margin-top:6px; color:#333; background:#f0ebf1; padding:6px 10px; border-radius:6px;">
            当前库存: ${isOreoSpecial ? `<strong>${totalPcs}</strong> 包` : `<strong>${displayCases}</strong> 件 ${specBox > 0 ? `<strong>${displayBoxes}</strong> 中盒 ` : ''}<strong>${displayPcs}</strong> 个`}
          </div>
          <div class="stock-input-group">
            <select class="stock-dir-select" onchange="updateStockInput('${p.id}', 'dir', this.value)">
              <option value="plus" ${currentDir === 'plus' ? 'selected' : ''}>增加 ➕</option>
              <option value="minus" ${currentDir === 'minus' ? 'selected' : ''}>减少 ➖</option>
            </select>
            
            ${isOreoSpecial ? `
              <div class="picker-wrapper">
                <select class="ios-picker" onchange="updateStockInput('${p.id}', 'pcs', this.value)">${makeQtyOptionsHtml(200, curP)}</select><span>包</span>
              </div>
            ` : `
              <div class="picker-wrapper">
                <select class="ios-picker" onchange="updateStockInput('${p.id}', 'cases', this.value)">${makeQtyOptionsHtml(50, curC)}</select><span>件</span>
              </div>
              ${specBox > 0 ? `
              <div class="picker-wrapper">
                <select class="ios-picker" onchange="updateStockInput('${p.id}', 'boxes', this.value)">${makeQtyOptionsHtml(50, curB)}</select><span>盒</span>
              </div>` : ''}
              <div class="picker-wrapper">
                <select class="ios-picker" onchange="updateStockInput('${p.id}', 'pcs', this.value)">${makeQtyOptionsHtml(100, curP)}</select><span>个</span>
              </div>
            `}
          </div>
        </div>
      `;
    }).join('')}
    <button class='float-submit' onclick='submitStock()'>💾 更新库存</button>
  `;
}

function updateStockInput(prodId, type, val){
  if(!stockData.additions[prodId]) stockData.additions[prodId] = { dir: 'plus', cases: 0, boxes: 0, pcs: 0 };
  if(type === 'dir') stockData.additions[prodId].dir = val;
  else stockData.additions[prodId][type] = parseInt(val) || 0;
}

async function submitStock(){
  const addIds = Object.keys(stockData.additions);
  let hasData = false; const updates = []; const reportLines = []; 

  for(let id of addIds){
    const p = products.find(x => x.id == id);
    const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(id));
    const specCase = p.pcs_per_case || 24; const specBox = p.pcs_per_box || 0;
    const dir = stockData.additions[id].dir || 'plus';
    const addedCases = stockData.additions[id].cases || 0;
    const addedBoxes = stockData.additions[id].boxes || 0;
    const addedPcs = stockData.additions[id].pcs || 0;

    let delta = isOreoSpecial ? addedPcs : (specBox > 0 ? (addedCases * specCase) + (addedBoxes * specBox) + addedPcs : (addedCases * specCase) + addedPcs);
    if(delta > 0){
      hasData = true; const currentTotal = stockData.currentStockMap[id] || 0;
      let newTotal = dir === 'plus' ? currentTotal + delta : currentTotal - delta;
      if (newTotal < 0) { alert(`❌ [${p.product_name}] 可用库存不足！`); return; }
      updates.push({ employee_code: stockData.emp_code, product_id: id, stock_qty: newTotal });
      reportLines.push(`• [${p.spec} ${p.product_name}] ${dir==='plus'?'增加':'减少'} : ${isOreoSpecial ? `${addedPcs}包` : `${addedCases}件${addedBoxes}盒${addedPcs}个`}`);
    }
  }
  if(!hasData){ alert("请输入变更量！"); return; }
  await client.from('emp_stocks').upsert(updates, { onConflict: 'employee_code,product_id' });
  alert(`🌟 库存更新成功！\n\n${reportLines.join('\n')}`);
  openStockManagement();
}

async function openStoreHistory(atom, name) {
  STATE = 'HISTORY'; currentStore = { atom, name };
  document.getElementById('back').classList.remove('hide'); 
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.add('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">📋 正在拉取历史记录与金额...</div>';
  
  const { data: ordersData } = await client.from('orders').select('*').eq('atom_code', atom).order('order_date', { ascending: false });
  historyOrders = ordersData || []; 

  if(historyOrders.length > 0) {
    const orderIds = historyOrders.map(o => o.id);
    const { data: itemsData } = await client.from('order_items').select('*').in('order_id', orderIds);
    const allItems = itemsData || [];
    
    historyOrders.forEach(o => {
      let sSum = 0; let rSum = 0; let gSum = 0;
      const oItems = allItems.filter(it => it.order_id === o.id);
      oItems.forEach(it => {
        const parsedReturn = parseReturnHandleText(it.return_handle);
        // 使用核心的高精度算账逻辑
        const rowRes = getLiveRowAmounts(it.product_id, it.qty || 0, it.price || 0, it.gift_qty || 0, parsedReturn.qty || 0);
        sSum += rowRes.saleAmount;
        gSum += rowRes.giftAmount;
        rSum += rowRes.returnAmount;
      });
      o.saleSum = sSum; o.returnSum = rSum; o.giftSum = gSum;
    });
  }
  renderHistory();
}

function renderHistory(){
  STATE = 'HISTORY';
  document.getElementById('list').innerHTML = `
    <div class="big-store-title">${currentStore.name}</div>
    <div style="margin: 14px 0;"><button class="btn-new-order" onclick="openOrder('${currentStore.atom}','${currentStore.name}')">＋ 新增单据</button></div>
    ${historyOrders.map(o => `
        <div class="history-item" onclick="viewOrderDetail('${o.id}', '${o.order_date}')">
          <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:15px; font-weight:700;">📅 ${o.order_date}</span>
            <span style="color:var(--primary); font-size:14px;">详情 →</span>
          </div>
          <div style="font-size: 13px; color: var(--text-muted);">
            卖进: <strong>${(o.saleSum||0).toFixed(1)}</strong> 元 | 售后: <strong>${(o.returnSum||0).toFixed(1)}</strong> 元 | 赠送: <strong>${(o.giftSum||0).toFixed(1)}</strong> 元
          </div>
        </div>
      `).join('')}
  `;
}

  const { data: items } = await client.from('order_items').select('*').eq('order_id', orderId);
  
  let rawItemsJSON = encodeURIComponent(JSON.stringify(items));
  let detailSaleSum = 0; let detailReturnSum = 0; let detailGiftSum = 0;

  items.forEach(it => {
    const parsedReturn = parseReturnHandleText(it.return_handle);
    const rowRes = getLiveRowAmounts(it.product_id, it.qty || 0, it.price || 0, it.gift_qty || 0, parsedReturn.qty || 0);
    detailSaleSum += rowRes.saleAmount;
    detailReturnSum += rowRes.returnAmount;
    detailGiftSum += rowRes.giftAmount;
  });

  document.getElementById('list').innerHTML = `
    <div class="big-store-title">${currentStore.name}</div>
    <div class="amount-summary-banner">卖进：<strong>${detailSaleSum.toFixed(1)}</strong> 元 | 售后：<strong>${detailReturnSum.toFixed(1)}</strong> 元 | 赠送：<strong>${detailGiftSum.toFixed(1)}</strong> 元</div>
    <button class="smallbtn" style="background:#fdf6ec; color:#e6a23c; margin: 10px 0;" onclick="editExistingOrder('${orderId}', '${orderDate}', '${rawItemsJSON}')">✏️ 修改订单</button>
    ${items.map(it => {
      const p = products.find(x => x.id == it.product_id) || { product_name: '未知商品', spec: '常规' };
      const parsedReturn = parseReturnHandleText(it.return_handle);
      const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(it.product_id));
      const decPlaces = getPriceDecimalPlaces(it.product_id); 
      return `
        <div class='item'>
          <div class="item-main-row">
            <div class='prod-info'>
              <div class='prod-name'>${p.spec} ${p.product_name}</div>
              ${parsedReturn.qty > 0 ? `<div style="font-size:12px; color:#e6a23c;">🔄 回收: ${parsedReturn.qty}包 (${parsedReturn.handle==='RESTORE'?'良品':'报损'})</div>` : ''}
              ${(it.gift_qty||0) > 0 ? `<div style="font-size:12px; color:#1890ff;">🎁 赠送: ${it.gift_qty}包</div>` : ''}
            </div>
            <div style="text-align:right; font-size:14px;">销售: <strong>${it.qty}</strong> ${isOreoSpecial?'中盒':'个'}<br><span class="sub">${Number(it.price).toFixed(decPlaces)}元</span></div>
          </div>
        </div>`;

  `;
}

function editExistingOrder(orderId, orderDate, rawItemsEncoded) {
  STATE = 'ORDER';
  const items = JSON.parse(decodeURIComponent(rawItemsEncoded));
  orderData = { id: orderId, atom: currentStore.atom, name: currentStore.name, date: orderDate, items: {}, oldItemsMap: {} };

  items.forEach(it => {
    const parsedReturn = parseReturnHandleText(it.return_handle);
    orderData.items[it.product_id] = { 
      qty: it.qty, price: it.price, gift_qty: it.gift_qty || 0,
      return_qty: parsedReturn.qty, return_handle: parsedReturn.handle,
      showPanel: parsedReturn.qty > 0 || (it.gift_qty || 0) > 0
    };
    
    // 计算库存冲抵影响（20,21要把销售的中盒换算成11包）
    const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(it.product_id));
    const saleBags = isOreoSpecial ? (it.qty * 11) : it.qty;
    const giftBags = isOreoSpecial ? (it.gift_qty || 0) : (it.gift_qty || 0);
    const returnBags = parsedReturn.qty || 0;

    let oldNet = saleBags + giftBags - (parsedReturn.handle === 'RESTORE' ? returnBags : 0);
    orderData.oldItemsMap[it.product_id] = oldNet; 
  });
  document.getElementById('editStateBadge').classList.remove('hide');
  renderOrder();
}

function openOrder(atom, name){
  STATE = 'ORDER'; const d = new Date(); 
  const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  orderData = { atom, name, date: today, items: {}, oldItemsMap: {} }; 
  renderOrder();
}

function calculateLiveOrderAmounts() {
  let s = 0; let r = 0; let g = 0;
  products.forEach(p => {
    const item = orderData.items[p.id];
    if(item) {
      const rowRes = getLiveRowAmounts(p.id, item.qty || 0, item.price || 0, item.gift_qty || 0, item.return_qty || 0);
      s += rowRes.saleAmount; 
      r += rowRes.returnAmount; 
      g += rowRes.giftAmount;     
    }
  });
  document.getElementById('liveAmountBanner').innerHTML = `卖进：<strong>${s.toFixed(1)}</strong> 元 | 售后：<strong>${r.toFixed(1)}</strong> 元 | 赠送：<strong>${g.toFixed(1)}</strong> 元`;
}

function renderOrder(){
  STATE = 'ORDER';
  const displayProducts = products.filter(p => p.brand === currentSelectedBrand && (currentSelectedSpec === "ALL" ? true : p.spec === currentSelectedSpec));

  document.getElementById('list').innerHTML = `
    <div class="big-store-title">${orderData.name}</div>
    <div style='margin-bottom:8px;'>📅 日期：<span id='dateText'>${orderData.date}</span>
      <div class="date-picker-wrapper"><button class='smallbtn'>修改日期</button><input type="date" class="real-date-input" value="${orderData.date}" onchange="syncSelectedDate(this.value)"></div>
    </div>
    <div id="liveAmountBanner" class="amount-summary-banner"></div>
    ${generateFilterHeaderHtml()}
    ${displayProducts.map(p => {
      const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(p.id));
      // 如果是20,21特殊奥利奥且没有初始化过，默认价格直接给 17.5
      const defaultPriceVal = isOreoSpecial ? 17.5 : (p.default_price || 15);
      
      const itData = orderData.items[p.id] || { qty: 0, price: defaultPriceVal, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false };
      const stepPlaces = getPriceDecimalPlaces(p.id);

      return `
        <div class='item'>
          <div class="item-main-row">
            <div class='prod-info'>
              <div class='prod-name'>${p.spec} ${p.product_name}</div>
              <button id="btn_as_${p.id}" class="btn-aftersale-trigger ${itData.return_qty > 0 || itData.gift_qty > 0 ? 'active' : ''}" onclick="toggleAfterSalePanel('${p.id}')">🔄 售后与赠送</button>
            </div>
            
            <div class='control-group'>
              <div class="picker-wrapper">
                <span>销售:</span>
                <select class="ios-picker" onchange="pickerChangeQty('${p.id}', this.value)">
                  ${makeQtyOptionsHtml(100, itData.qty, isOreoSpecial ? '中盒' : '个')}
                </select>
              </div>
              <div class="picker-wrapper">
                <span>单价:</span>
                <select class="ios-picker" onchange="pickerChangePrice('${p.id}', this.value)">
                  ${makePriceOptionsHtml(defaultPriceVal, stepPlaces, itData.price)}
                </select>
              </div>
            </div>
          </div>
          
          <div id="panel_${p.id}" class="aftersale-panel ${itData.showPanel ? '' : 'hide'}">
            <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
              <div class="picker-wrapper">
                <span>赠送:</span>
                <select class="ios-picker" onchange="pickerChangeGiftQty('${p.id}', this.value)">
                  ${makeQtyOptionsHtml(50, itData.gift_qty, '包')}
                </select>
              </div>
              <div class="picker-wrapper">
                <span>回收:</span>
                <select class="ios-picker" onchange="pickerChangeReturnQty('${p.id}', this.value)">
                  ${makeQtyOptionsHtml(100, itData.return_qty, '包')}
                </select>
              </div>
            </div>
            <div class="aftersale-options">
              <label><input type="radio" name="handle_${p.id}" value="RESTORE" ${itData.return_handle!=='SCRAP'?'checked':''} onchange="setReturnHandle('${p.id}','RESTORE')">🟢良品</label>
              <label><input type="radio" name="handle_${p.id}" value="SCRAP" ${itData.return_handle==='SCRAP'?'checked':''} onchange="setReturnHandle('${p.id}','SCRAP')">🔴报损</label>
            </div>
          </div>
        </div>`;
    }).join('')}
    <button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>
  `;
  calculateLiveOrderAmounts();
}

function initItemState(id) {
  if(!orderData.items[id]){ 
    const p = products.find(x => x.id == id); 
    const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(id));
    const defaultPriceVal = isOreoSpecial ? 17.5 : (p.default_price || 15);
    orderData.items[id] = { qty: 0, price: defaultPriceVal, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; 
  }
}

function pickerChangeQty(id, value) { initItemState(id); orderData.items[id].qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function pickerChangePrice(id, value) { initItemState(id); orderData.items[id].price = parseFloat(value) || 0; calculateLiveOrderAmounts(); }
function pickerChangeGiftQty(id, value) { initItemState(id); orderData.items[id].gift_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function pickerChangeReturnQty(id, value) { initItemState(id); orderData.items[id].return_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }

function toggleAfterSalePanel(id) { initItemState(id); orderData.items[id].showPanel = !orderData.items[id].showPanel; renderOrder(); }
function setReturnHandle(id, h) { initItemState(id); orderData.items[id].return_handle = h; calculateLiveOrderAmounts(); }
function syncSelectedDate(val){ if(!val) return; orderData.date = val; document.getElementById('dateText').innerText = val; }

async function submitOrder(){
  const submitBtn = document.querySelector('.float-submit');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '⏳ 提交中...'; }

  const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
  const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_id] = st.stock_qty || 0; });

  const stockUpdates = []; let isStockDeficit = false; 
  const allProdIds = new Set([...Object.keys(orderData.items), ...Object.keys(orderData.oldItemsMap || {})]);

  for (let id of allProdIds) {
    const item = orderData.items[id] || { qty: 0, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE' };
    const oldNetImpact = orderData.oldItemsMap?.[id] || 0; 
    
    // 扣减库存换算单位
    const isOreoSpecial = BOX_SALE_OREO_IDS.includes(Number(id));
    const saleBags = isOreoSpecial ? (item.qty * 11) : item.qty;
    const giftBags = isOreoSpecial ? (item.gift_qty || 0) : (item.gift_qty || 0);
    const returnBags = item.return_qty || 0;

    let currentNetImpact = saleBags + giftBags - (item.return_handle === 'RESTORE' ? returnBags : 0);
    const delta = currentNetImpact - oldNetImpact; 
    const finalNewStock = (liveStockMap[id] || 0) - delta;

    if (finalNewStock < 0) isStockDeficit = true;
    if (delta !== 0 || item.qty > 0 || item.return_qty > 0 || item.gift_qty > 0) {
      stockUpdates.push({ employee_code: currentEmployee.code, product_id: id, stock_qty: finalNewStock });
    }
  }

  const formattedItems = [];
  Object.keys(orderData.items).forEach(id => { 
    const it = orderData.items[id]; 
    if(it.qty > 0 || it.return_qty > 0 || it.gift_qty > 0){ 
      const textValue = `${it.return_qty || 0}_${it.return_handle}`;
      formattedItems.push({ 
        product_id: id, qty: it.qty, price: it.price, gift_qty: it.gift_qty || 0, return_handle: textValue 
      }); 
    } 
  });

  if (orderData.id) {
    await client.from('orders').update({ order_date: orderData.date }).eq('id', orderData.id);
    await client.from('order_items').delete().eq('order_id', orderData.id);
    formattedItems.forEach(fit => fit.order_id = orderData.id);
    await client.from('order_items').insert(formattedItems); 
  } else {
    const { data: o } = await client.from('orders').insert({ employee_code: currentEmployee.code, atom_code: orderData.atom, order_date: orderData.date }).select().single();
    formattedItems.forEach(fit => fit.order_id = o.id);
    await client.from('order_items').insert(formattedItems); 
  }

  if (stockUpdates.length > 0) await client.from('emp_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_id' });
  alert(isStockDeficit ? '成功提交！库存出现负数，请注意补充。' : '提交成功！');
  openStoreHistory(currentStore.atom, currentStore.name);
}

function goBack(){
  if(STATE === 'STOCK') renderStores(); 
  else if(STATE === 'DETAIL') renderHistory();
  else if(STATE === 'ORDER') orderData?.id ? viewOrderDetail(orderData.id, orderData.date) : renderHistory();
  else if(STATE === 'HISTORY') renderStores(); 
  else if(STATE === 'STORE') renderEmployees();
}

init();
