<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快消开单系统</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    }

    body{
      margin:0;
      background:#f5f5f5;
      color:#111;
    }

    .header{
      position:sticky;
      top:0;
      z-index:10;
      background:white;
      padding:14px;
      border-bottom:1px solid #ddd;

      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .title{
      font-size:20px;
      font-weight:bold;
    }

    .container{
      padding:12px;
    }

    .card{
      background:white;
      padding:14px;
      border-radius:14px;
      margin-bottom:10px;
      cursor:pointer;
    }

    .store-name{
      font-size:16px;
      font-weight:bold;
    }

    .store-code{
      margin-top:4px;
      color:#666;
      font-size:13px;
    }

    .search{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ccc;
      margin-bottom:12px;
      font-size:16px;
    }

    .btn{
      border:none;
      background:black;
      color:white;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    .back{
      margin-bottom:12px;
      font-weight:bold;
      cursor:pointer;
    }

    .history{
      background:white;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
    }

    .product-row{
      background:white;
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .product-info{
      flex:1;
    }

    .product-name{
      font-weight:bold;
    }

    .product-rule{
      font-size:12px;
      color:#666;
      margin-top:4px;
    }

    .qty-group{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty-btn{
      width:32px;
      height:32px;
      border-radius:50%;
      border:none;
      background:black;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    .qty-box{
      min-width:90px;
      text-align:center;
    }

    .stock-row{
      background:white;
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;
    }

    .stock-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .small-btn{
      padding:6px 10px;
      border:none;
      border-radius:8px;
      background:black;
      color:white;
      cursor:pointer;
    }

    .line{
      margin-top:10px;
      display:flex;
      gap:8px;
      align-items:center;
    }

    input[type="number"]{
      width:70px;
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .date-input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ccc;
      margin-bottom:12px;
      font-size:16px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

const db = {
  salespersons: [
    {
      id:1,
      name:"张三",

      stock:{
        "奥利奥97g":{
          total:49
        },

        "炫迈西瓜":{
          total:63
        }
      },

      stores:[
        {
          id:101,
          code:"FS001",
          name:"美宜佳西樵店",

          history:[
            {
              date:"2026-05-23",

              items:[
                {
                  product:"奥利奥97g",
                  total:27
                }
              ]
            }
          ]
        },

        {
          id:102,
          code:"FS002",
          name:"天天便利店",
          history:[]
        }
      ]
    },

    {
      id:2,
      name:"李四",

      stock:{
        "奥利奥97g":{
          total:24
        },

        "炫迈西瓜":{
          total:20
        }
      },

      stores:[
        {
          id:201,
          code:"GZ001",
          name:"华润万家",
          history:[]
        }
      ]
    }
  ],

  products:[
    {
      name:"奥利奥97g",
      unit:"条",
      caseUnit:"件",
      perCase:24
    },

    {
      name:"炫迈西瓜",
      unit:"个",
      caseUnit:"盒",
      perCase:20
    }
  ]
};

const app = document.getElementById("app");

let currentSalesperson = null;
let currentStore = null;

function formatStock(total, perCase, caseUnit, unit){

  const cases = Math.floor(total / perCase);

  const singles = total % perCase;

  return `${cases}${caseUnit}${singles}${unit}`;
}

function getProduct(name){
  return db.products.find(p => p.name === name);
}

function renderHome(){

  app.innerHTML = `
  
    <div class="header">
      <div class="title">选择业务员</div>
    </div>

    <div class="container">

      ${db.salespersons.map(sp => `
      
        <div class="card" onclick="openSalesperson(${sp.id})">
          ${sp.name}
        </div>

      `).join("")}

    </div>
  
  `;
}

window.openSalesperson = function(id){

  currentSalesperson = db.salespersons.find(s => s.id === id);

  renderSalespersonPage();
}

function renderSalespersonPage(){

  app.innerHTML = `
  
    <div class="header">

      <div class="title">${currentSalesperson.name}</div>

      <button class="btn" onclick="renderStockPage()">
        库存管理
      </button>

    </div>

    <div class="container">

      <input
        id="search"
        class="search"
        placeholder="搜索店铺名称或编号"
        oninput="searchStores()"
      >

      <div id="storeList">

        ${renderStoreList(currentSalesperson.stores)}

      </div>

    </div>
  
  `;
}

function renderStoreList(stores){

  return stores.map(store => `
  
    <div class="card" onclick="openStore(${store.id})">

      <div class="store-name">${store.name}</div>

      <div class="store-code">${store.code}</div>

    </div>
  
  `).join("");
}

window.searchStores = function(){

  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = currentSalesperson.stores.filter(store => {

    return store.name.toLowerCase().includes(keyword)
      || store.code.toLowerCase().includes(keyword);

  });

  document.getElementById("storeList").innerHTML =
    renderStoreList(filtered);
}

window.openStore = function(id){

  currentStore =
    currentSalesperson.stores.find(s => s.id === id);

  renderStorePage();
}

function renderStorePage(){

  app.innerHTML = `
  
    <div class="header">

      <div>

        <div class="title">${currentStore.name}</div>

        <div>${currentStore.code}</div>

      </div>

      <button class="btn" onclick="renderNewOrderPage()">
        新增记录
      </button>

    </div>

    <div class="container">

      <div class="back" onclick="renderSalespersonPage()">
        ← 返回
      </div>

      <h3>历史记录</h3>

      ${currentStore.history.length === 0

        ? `<div>暂无记录</div>`

        : currentStore.history.map(h => `

          <div class="history">

            <div>
              <strong>${h.date}</strong>
            </div>

            <div style="margin-top:8px;">

              ${h.items.map(item => {

                const p = getProduct(item.product);

                return `
                
                  <div>
                    ${item.product}
                    -
                    ${formatStock(
                      item.total,
                      p.perCase,
                      p.caseUnit,
                      p.unit
                    )}
                  </div>
                
                `;
              }).join("")}

            </div>

          </div>

        `).join("")
      }

    </div>
  
  `;
}

function renderNewOrderPage(){

  const order = {};

  db.products.forEach(p => {

    order[p.name] = {
      caseQty:0,
      singleQty:0
    };

  });

  app.innerHTML = `
  
    <div class="header">

      <div class="title">新增记录</div>

      <button class="btn" onclick="saveOrder()">
        保存
      </button>

    </div>

    <div class="container">

      <div class="back" onclick="renderStorePage()">
        ← 返回
      </div>

      <input
        type="date"
        id="orderDate"
        class="date-input"
      >

      <div id="products"></div>

    </div>
  
  `;

  document.getElementById("orderDate").value =
    new Date().toISOString().split("T")[0];

  const productsDiv = document.getElementById("products");

  db.products.forEach(product => {

    const row = document.createElement("div");

    row.className = "product-row";

    row.innerHTML = `
    
      <div class="product-info">

        <div class="product-name">
          ${product.name}
        </div>

        <div class="product-rule">
          1${product.caseUnit} = ${product.perCase}${product.unit}
        </div>

      </div>

      <div>

        <div class="qty-group">

          <button class="qty-btn">-</button>

          <div class="qty-box" id="case-${product.name}">
            0${product.caseUnit}
          </div>

          <button class="qty-btn">+</button>

        </div>

        <div class="qty-group" style="margin-top:8px;">

          <button class="qty-btn">-</button>

          <div class="qty-box" id="single-${product.name}">
            0${product.unit}
          </div>

          <button class="qty-btn">+</button>

        </div>

      </div>
    
    `;

    const btns = row.querySelectorAll(".qty-btn");

    btns[0].onclick = () => {

      if(order[product.name].caseQty > 0){

        order[product.name].caseQty--;

        update();
      }
    };

    btns[1].onclick = () => {

      order[product.name].caseQty++;

      update();
    };

    btns[2].onclick = () => {

      if(order[product.name].singleQty > 0){

        order[product.name].singleQty--;

        update();
      }
    };

    btns[3].onclick = () => {

      order[product.name].singleQty++;

      update();
    };

    function update(){

      document.getElementById(`case-${product.name}`).innerText =
        order[product.name].caseQty + product.caseUnit;

      document.getElementById(`single-${product.name}`).innerText =
        order[product.name].singleQty + product.unit;
    }

    productsDiv.appendChild(row);

  });

  window.saveOrder = function(){

    const items = [];

    db.products.forEach(product => {

      const data = order[product.name];

      const total =
        data.caseQty * product.perCase
        + data.singleQty;

      if(total > 0){

        items.push({
          product:product.name,
          total
        });

        currentSalesperson.stock[product.name].total -= total;

        if(currentSalesperson.stock[product.name].total < 0){

          currentSalesperson.stock[product.name].total = 0;
        }
      }
    });

    if(items.length === 0){

      alert("请至少选择商品");

      return;
    }

    currentStore.history.unshift({

      date:document.getElementById("orderDate").value,

      items

    });

    alert("保存成功");

    renderStorePage();
  }
}

window.renderStockPage = function(){

  app.innerHTML = `
  
    <div class="header">

      <div class="title">库存管理</div>

      <button class="btn" onclick="renderSalespersonPage()">
        返回
      </button>

    </div>

    <div class="container">

      ${Object.entries(currentSalesperson.stock).map(([name,data]) => {

        const p = getProduct(name);

        return `
        
          <div class="stock-row">

            <div class="stock-top">

              <div>

                <div class="product-name">
                  ${name}
                </div>

                <div class="product-rule">
                  当前库存：
                  ${formatStock(
                    data.total,
                    p.perCase,
                    p.caseUnit,
                    p.unit
                  )}
                </div>

              </div>

            </div>

            <div class="line">

              <input
                type="number"
                id="caseInput-${name}"
                placeholder="件"
              >

              <input
                type="number"
                id="singleInput-${name}"
                placeholder="散"
              >

              <button
                class="small-btn"
                onclick="addStock('${name}')"
              >
                入库
              </button>

            </div>

          </div>
        
        `;
      }).join("")}

    </div>
  
  `;
}

window.addStock = function(name){

  const p = getProduct(name);

  const caseQty =
    Number(document.getElementById(`caseInput-${name}`).value || 0);

  const singleQty =
    Number(document.getElementById(`singleInput-${name}`).value || 0);

  const total =
    caseQty * p.perCase + singleQty;

  currentSalesperson.stock[name].total += total;

  renderStockPage();
}

renderHome();

</script>

</body>
</html>
