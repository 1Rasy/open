<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>库存卖进</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root { --primary: #4A154B; --accent: #ffb81c; --bg-main: #f4f2f5; --text-main: #1f1121; }
body { font-family: -apple-system, sans-serif; background: var(--bg-main); padding-bottom: 90px; }
.card { background: #fff; margin:12px; padding:16px; border-radius:12px; }
.btn-group-dual { display: flex; gap: 10px; margin-bottom: 16px; }
.btn-dual { flex: 1; padding: 14px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; color: white; }
.btn-stock { background: #4A154B; }
.btn-report { background: #e6a23c; }
.stat-box { background: #fdfaf6; border: 1px solid #faebd7; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
.stat-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
.item { padding:14px 0; border-bottom:1px solid #f4f2f5; }
.item-row { display: flex; justify-content: space-between; align-items: center; }
.hide { display:none !important; }
.ios-picker { background: #f4f2f5; border: 1px solid #dcd6dd; border-radius: 6px; padding: 6px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
    <div id="navView">
        <div class="btn-group-dual">
            <button class="btn-dual btn-stock" onclick="openStockManagement()">📦 库存管理</button>
            <button class="btn-dual btn-report" onclick="openDailyReport()">📊 卖进日报</button>
        </div>
    </div>
    <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = supabase.createClient("https://mnmzqmqxdzagpounvchn.supabase.co", "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF");

// 新增：卖进日报查看逻辑
async function openDailyReport(date = new Date().toISOString().split('T')[0]) {
    document.getElementById('list').innerHTML = `<h3>📅 卖进日报</h3>
        <input type="date" value="${date}" onchange="openDailyReport(this.value)">
        <div id="reportContent">计算中...</div>`;
    
    const { data: orders } = await client.from('orders').select('id, atom_code').eq('order_date', date);
    if (!orders || orders.length === 0) { document.getElementById('reportContent').innerHTML = "当日无数据"; return; }
    
    const { data: items } = await client.from('order_items').select('*').in('order_id', orders.map(o => o.id));
    
    let totalSale = 0, totalGift = 0, totalScrap = 0, totalIncome = 0;
    items.forEach(it => {
        const ret = (it.return_handle || "").split('_');
        const retQty = parseInt(ret[0]) || 0;
        const isScrap = ret[1] === 'SCRAP';
        
        totalSale += (it.qty * it.price);
        totalGift += (it.gift_qty || 0);
        if (isScrap) totalScrap += retQty;
        totalIncome += (it.qty * it.price) - (isScrap ? (retQty * it.price) : 0);
    });

    document.getElementById('reportContent').innerHTML = `
        <div class="stat-box">
            <div class="stat-row"><span>💰 卖进总额:</span> <b>${totalSale.toFixed(1)} 元</b></div>
            <div class="stat-row"><span>💵 实际收入:</span> <b>${totalIncome.toFixed(1)} 元</b></div>
            <div class="stat-row"><span>🎁 赠送总数:</span> <b>${totalGift} 个</b></div>
            <div class="stat-row"><span>🔴 过期总数:</span> <b>${totalScrap} 个</b></div>
        </div>
    `;
}

// 修改开单逻辑：赠送过期放同一行
function renderOrderRow(p, it) {
    return `
    <div class="item">
        <div><strong>${p.product_name}</strong></div>
        <div class="item-row">
            <span>销售: <select class="ios-picker"><option>${it.qty}</option></select></span>
            <span>赠: <select class="ios-picker"><option>${it.gift_qty || 0}</option></select></span>
            <span>过: <select class="ios-picker"><option>${(it.return_handle || "").split('_')[0]}</option></select></span>
        </div>
    </div>`;
}

// 占位函数（此处省略已实现的库存跳转逻辑）
function openStockManagement() { alert("跳转至库存管理..."); }
</script>
</body>
</html>
