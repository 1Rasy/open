<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>开单+库存管理系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --primary: #4A154B;        
      --primary-hover: #360f37; 
      --accent: #ffb81c;        
      --bg-main: #f4f2f5;       
      --text-main: #1f1121;     
      --text-muted: #756676;    
      --card-bg: #ffffff;       
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); position: relative;}
    .top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; transition: all 0.2s; }
    .back-btn:active { background: #e2dde3; transform: scale(0.97); }
    .editing-badge { font-size:12px; color:#e6a23c; background:#fff7eb; padding:6px 12px; border-radius:14px; font-weight:bold; border: 1px solid #f5dab1; }
    #list { width: 100%; }
    .big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; letter-spacing: -0.5px; }
    .emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 0; }
    .emp-card { background: #faf9fa; border: 1px solid #eeeade; border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 12px; cursor: pointer; transition: all 0.15s ease; box-sizing: border-box; }
    .emp-card:active { background: #f3e2f5; transform: scale(0.97); }
    .store-container { padding-right: 24px; box-sizing: border-box; }
    .letter-group-title { background: #f4f2f5; color: var(--primary); font-weight: 700; font-size: 14px; padding: 4px 8px; margin: 12px 0 6px 0; border-radius: 4px; }
    .item { padding:14px 4px; border-bottom:1px solid #f4f2f5; box-sizing: border-box; width: 100%; }
    .item-main-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .prod-info { flex: 1; min-width: 0; }
    .prod-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .control-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 75%; }
    .picker-wrapper { display: inline-flex; align-items: center; gap: 3px; font-size: 13px; color: var(--text-muted); }
    .picker-wrapper span.label-txt { font-weight: 500; color: #665c67; }
    .picker-wrapper span.unit-txt { font-weight: 600; color: var(--text-main); font-size: 13px; }
    .ios-picker { background: #f4f2f5; color: var(--text-main); border: 1px solid #dcd6dd; border-radius: 6px; padding: 6px 6px; font-size: 14px; font-weight: 700; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; text-align: center; min-width: 40px; }
    .ios-picker:focus { border-color: var(--primary); background: #fff; }
    .aftersale-panel { background: #fdfaf6; border: 1px dashed #f5dab1; border-radius: 8px; padding: 12px; margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
    .aftersale-row-picks { display: flex; align-items: center; gap: 12px; width: 100%; border-bottom: 1px dashed #faebd7; padding-bottom: 8px; }
    .aftersale-options { display: flex; gap: 14px; margin-top: 2px; }
    .aftersale-options label { display: flex; align-items: center; gap: 4px; font-weight: 600; cursor: pointer; font-size: 13px; }
    .store-top-gates { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn-gate-half { flex: 1; color: #fff; padding: 14px 8px; border-radius: 10px; font-size: 14px; font-weight: 700; text-align: center; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 4px 10px rgba(74,21,75,0.12); }
    .btn-gate-stock { background: linear-gradient(135deg, var(--primary), #6b266c); }
    .btn-gate-report { background: linear-gradient(135deg, #1890ff, #0050b3); }
    .btn-new-order { background: var(--primary); color:#fff; padding:12px; width:100%; border-radius:8px; font-size: 16px; font-weight:600; margin-bottom:15px; text-align:center; border:none; }
    .smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .date-picker-wrapper { position: relative; display: inline-block; }
    .real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
    .search-wrapper input { width:100%; padding:12px 40px 12px 12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa; }
    .search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }
    .search-clear-btn:active { background: #d0c9d2; }
    .btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-weight: bold; font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-top: 4px; }
    .btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }
    .brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }
    .brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }
    .brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }
    .spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }
    .spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500; }
    .spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }
    .brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }
    .sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }
    .hide { display:none !important; }
    .history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }
    .stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box; }
    .stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
    .btn-toggle-dir { padding: 6px 12px; border: 1px solid var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.15s ease; }
    .btn-toggle-dir.plus { background: #fff4fc; color: var(--primary); }
    .btn-toggle-dir.minus { background: #fff0f0; color: #d93025; border-color: #d93025; }
    .alphabet-sidebar { position: fixed; right: 16px; top: 140px; bottom: 100px; width: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; background: rgba(255, 255, 255, 0.85); border-radius: 12px; box-shadow: 0 2px 8px rgba(74,21,75,0.08); border: 1px solid #eeeade; user-select: none; -webkit-user-select: none; }
    .amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; color: #2b1d2c; }
    .amount-summary-banner strong { font-size: 15px; }
    .detail-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 4px; font-size: 13px; color: var(--text-muted); line-height: 1.4; }
    .detail-grid-item { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<div class="card">
  <div id="searchBlock" class="search-wrapper">
    <input id="search" placeholder="快速搜索..." oninput="handleSearch()" />
    <div id="clearSearch" class="search-clear-btn" onclick="clearSearchInput()">✕</div>
  </div>

  <div class="top-action-bar">
    <div id="back" class="back-btn hide" onclick="goBack()">返回</div>
    <div id="editStateBadge" class="editing-badge hide">正在修改历史单据</div>
  </div>

  <div id="list"></div>
  <div id="alphabetSidebar" class="alphabet-sidebar hide"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

<script>
  window.APP_STATE = {
    STATE: "EMP",
    employees: [],
    stores: [],
    products: [],
    currentEmployee: null,
    currentStore: null,
    orderData: null,
    currentSelectedBrand: null,
    currentSelectedSpec: "ALL",
    historyOrders: [],
    stockData: {},
    selectedReportDate: ""
  };
</script>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/employee.js"></script>
<script src="js/store.js"></script>
<script src="js/stock.js"></script>
<script src="js/report.js"></script>
<script src="js/app.js"></script>

</body>
</html>
