<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>门店开单系统 V2（稳定版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
.header { padding:12px; font-size:18px; background:#fff; position:sticky; top:0; z-index:10; }
.card { background:#fff; margin:10px; padding:10px; border-radius:10px; }
.item { padding:10px; border-bottom:1px solid #eee; }
.item:active { background:#f0f7ff; }
input, button { font-size:16px; }
input { width:100%; padding:8px; margin:5px 0; box-sizing:border-box; }
button { background:#1677ff; color:#fff; border:none; padding:6px 10px; border-radius:6px; }
.smallbtn { background:#eee; color:#333; padding:4px 6px; margin-left:6px; }
.brand { font-weight:bold; margin-top:10px; }
.row { display:flex; justify-content:space-between; align-items:center; }
.sub { font-size:12px; color:#888; }
.hide { display:none; }
</style>
</head>

<body>

<div class="header">📦 门店开单系统 V2</div>

<div class="card">
<input id="search" placeholder="搜索员工 / 门店" oninput="handleSearch()" />
<div id="back" class="sub hide" onclick="goBack()">← 返回</div>
<div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let STATE = "EMP";
let employees = [];
let stores = [];
let products = [];

let currentEmployee = null;
let currentStores = [];
let orderData = null;

// INIT
async function init(){
  const e = await client.from('employees').select('*');
  const s = await client.from('stores_dim').select('*');
  const p = await client.from('products').select('*');

  employees = e.data || [];
  stores = s.data || [];
  products = p.data || [];

  renderEmployees();
}

function handleSearch(){
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
  else if(STATE === 'ORDER') renderOrder();
}

function getSearch(){
  return document.getElementById('search').value || '';
}

// EMP
function renderEmployees(){
  STATE = 'EMP';
  document.getElementById('back').classList.add('hide');

  const k = getSearch();

  const list = employees.filter(e=>
    (e.employee_name||'').includes(k) ||
    (e.employee_code||'').includes(k)
  );

  document.getElementById('list').innerHTML = list.map(e=>`
    <div class='item' onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
      ${e.employee_name}
      <div class='sub'>${e.employee_code}</div>
    </div>
  `).join('');
}

// STORE
async function openEmployee(code,name){
  STATE = 'STORE';
  currentEmployee = {code,name};

  document.getElementById('back').classList.remove('hide');
  document.getElementById('list').innerHTML = '加载中...';

  const r = await client.from('employee_stores')
    .select('atom_code')
    .eq('employee_code', code);

  const codes = (r.data||[]).map(i=>i.atom_code);
  currentStores = stores.filter(s=>codes.includes(s.atom_code));

  renderStores();
}

function renderStores(){
  STATE = 'STORE';

  const k = getSearch();

  const f = currentStores.filter(s=>
    (s.store_name||'').includes(k)
  );

  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:bold;margin-bottom:10px;'>当前员工：${currentEmployee.name}</div>
    ${f.map(s=>`
      <div class='item' onclick="openOrder('${s.atom_code}','${s.store_name}')">
        ${s.store_name}
        <div class='sub'>${s.atom_code}</div>
      </div>
    `).join('')}
  `;
}

// ORDER
function openOrder(atom,name){
  STATE = 'ORDER';
  document.getElementById('back').classList.remove('hide');

  const today = new Date().toISOString().split('T')[0];

  orderData = {
    atom,
    name,
    date: today,
    items: {}
  };

  renderOrder();
}

function renderOrder(){
  STATE = 'ORDER';

  const grouped = {};
  products.forEach(p=>{
    if(!grouped[p.brand]) grouped[p.brand]=[];
    grouped[p.brand].push(p);
  });

  // 修复了这里原本断开的字符串模板拼接
  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:bold;margin-bottom:10px;'>当前门店：${orderData.name}</div>
    <div class='row' style='margin-bottom:15px;'>
      <span>📅 日期: <span id='dateText'>${orderData.date}</span></span>
      <button class='smallbtn' onclick='editDate()'>修改</button>
    </div>

    ${Object.keys(grouped).map(b=>`
      <div class='brand'>${b}</div>
      ${grouped[b].map(p=>`
        <div class='item'>
          <div>${p.spec || ''}${p.product_name}</div>
          <div class='sub'>默认 ${p.default_price}元</div>

          <div style='margin-top:5px;'>
            数量：
            <button onclick="changeQty('${p.id}',-1)">-</button>
            <span id='q_${p.id}' style='margin:0 8px;font-weight:bold;'>${orderData.items[p.id]?.qty||0}</span>
            <button onclick="changeQty('${p.id}',1)">+</button>
          </div>

          <div style='margin-top:5px;'>
            价格：
            <button onclick="changePrice('${p.id}',-0.1)">-</button>
            <span id='p_${p.id}' style='margin:0 8px;'>${orderData.items[p.id]?.price ?? p.default_price}</span>
            <button onclick="changePrice('${p.id}',0.1)">+</button>
          </div>
        </div>
      `).join('')}
    `).join('')}

    <div style='margin-top:20px; text-align:center;'>
      <button onclick='submitOrder()' style='width:100%; padding:10px;'>提交订单</button>
    </div>
  `;
}

function changeQty(id,v){
  if(!orderData.items[id]){
    const p = products.find(x=>x.id==id);
    orderData.items[id] = {qty:0, price:p.default_price};
  }
  orderData.items[id].qty = Math.max(0, (orderData.items[id].qty||0)+v);
  document.getElementById('q_'+id).innerText = orderData.items[id].qty;
}

function changePrice(id,v){
  if(!orderData.items[id]){
    const p = products.find(x=>x.id==id);
    orderData.items[id] = {qty:0, price:p.default_price};
  }
  orderData.items[id].price = +(orderData.items[id].price + v).toFixed(1);
  document.getElementById('p_'+id).innerText = orderData.items[id].price;
}

function editDate(){
  const d = prompt('修改日期', orderData.date);
  if(d){
    orderData.date = d;
    document.getElementById('dateText').innerText = d;
  }
}

async function submitOrder(){
  // 先判断有没有选商品数量
  const hasItems = Object.keys(orderData.items).some(id => orderData.items[id].qty > 0);
  if(!hasItems){
    alert("请至少选择一件商品数量大于0");
    return;
  }

  const { data: o, error } = await client.from('orders').insert({
    employee_code: currentEmployee.code,
    atom_code: orderData.atom,
    order_date: orderData.date
  }).select().single();

  if(error){
    alert("主订单提交失败：" + error.message);
    return;
  }

  const items = [];
  Object.keys(orderData.items).forEach(id=>{
    const it = orderData.items[id];
    if(it.qty > 0){
      items.push({
        order_id: o.id,
        product_id: id,
        qty: it.qty,
        price: it.price
      });
    }
  });

  if(items.length > 0){
    const { error: itemErr } = await client.from('order_items').insert(items);
    if(itemErr){
      alert("商品明细提交失败：" + itemErr.message);
      return;
    }
  }

  alert('订单提交成功！');
  // 提交成功后回到当前员工的门店列表
  openEmployee(currentEmployee.code, currentEmployee.name);
}

// BACK (修复了原本的大小写问题 goback -> goBack)
function goBack(){
  if(STATE === 'ORDER') openEmployee(currentEmployee.code,currentEmployee.name);
  else if(STATE === 'STORE') renderEmployees();
}

// 执行初始化
init();

</script>

</body>
</html>
