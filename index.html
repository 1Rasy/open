<script>
// ... (保留之前的配置及初始化逻辑)

// 🟢 新增：渲染店铺历史记录时，计算该店所有历史数据的总金额
async function openStoreHistory(atom, name) {
  STATE = 'HISTORY'; currentStore = { atom, name };
  document.getElementById('back').classList.remove('hide'); 
  document.getElementById('list').innerHTML = '<div style="padding:10px;">📊 正在统计门店历史金额...</div>';
  
  // 1. 获取所有订单
  const { data: orders } = await client.from('orders').select('*').eq('atom_code', atom).order('order_date', { ascending: false });
  historyOrders = orders || [];
  
  // 2. 获取该店铺下所有订单的明细
  const orderIds = historyOrders.map(o => o.id);
  let totalSale = 0;
  let totalReturn = 0;

  if (orderIds.length > 0) {
    const { data: allItems } = await client.from('order_items').select('*').in('order_id', orderIds);
    (allItems || []).forEach(it => {
      const p = products.find(x => x.id == it.product_id) || { default_price: 0 };
      totalSale += (it.qty || 0) * (it.price || 0);
      totalReturn += (it.return_qty || 0) * (p.default_price || 0);
    });
  }

  document.getElementById('list').innerHTML = `
    <div class="big-store-title">${currentStore.name}</div>
    
    <div class="amount-summary-banner" style="background:#fdfdfd; border-left:5px solid var(--primary);">
      <div>历史累计卖进：<strong style="color:var(--primary);">${totalSale.toFixed(1)}</strong> 元</div>
      <div style="margin-top:4px;">历史累计售后：<strong style="color:#e6a23c;">${totalReturn.toFixed(1)}</strong> 元</div>
    </div>

    <div style="margin: 14px 0;"><button class="btn-new-order" onclick="openOrder('${currentStore.atom}','${currentStore.name}')">＋ 新增单据</button></div>
    <div style="font-size:14px; font-weight:700; margin-bottom:10px; color:var(--text-muted);">📂 历史账单明细 (${historyOrders.length})</div>
    ${historyOrders.map(o => `
        <div class="history-item" onclick="viewOrderDetail('${o.id}', '${o.order_date}')">
          <div><span style="font-size:15px; font-weight:700; color:#111827;">📅 ${o.order_date}</span></div>
          <span style="color:var(--primary); font-size:14px; font-weight:600;">查看 →</span>
        </div>
    `).join('')}
  `;
}

// ... (其他逻辑保持不变)

  // ... (中间的逻辑不变)

  const items = []; 
  Object.keys(orderData.items).forEach(id=>{ 
    const it = orderData.items[id]; 
    if(it.qty > 0 || it.return_qty > 0){ 
      let itemObj = { 
        order_id: orderData.id || newOrderId,

        price: it.price,

      }; 
      items.push(itemObj); 
    } 
  });
  
  // ... (后续提交逻辑)
}
