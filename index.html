<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>门店开单系统 V2（精简高效版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; padding-bottom: 80px; } /* 留出底部空间防遮挡 */
.header { padding:12px; font-size:18px; background:#fff; position:sticky; top:0; z-index:10; border-bottom:1px solid #e8e8e8; }
.card { background:#fff; margin:10px; padding:10px; border-radius:10px; position: relative; }
.item { padding:10px 0; border-bottom:1px solid #eee; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.item:active { background:#f0f7ff; }
input, button { font-size:15px; }
input { width:100%; padding:8px; margin:5px 0; box-sizing:border-box; }

/* 按钮基础样式 */
button { background:#1677ff; color:#fff; border:none; padding:5px 10px; border-radius:4px; cursor: pointer; }
.smallbtn { background:#eee; color:#333; padding:4px 6px; margin-left:6px; font-size: 13px; }
.btn-counter { background:#e6f4ff; color:#1677ff; font-weight: bold; padding: 3px 8px; }

/* 品牌快捷键区域 */
.brand-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.brand-badge { background: #e8e8e8; color: #333; padding: 4px 8px; border-radius: 4px; font-size: 13px; cursor: pointer; }
.brand-badge:active { background: #1677ff; color: #fff; }

.brand { font-weight:bold; margin-top:15px; padding: 4px 0; color: #333; border-left: 3px solid #1677ff; padding-left: 6px; }
.row { display:flex; justify-content:space-between; align-items:center; }
.sub { font-size:12px; color:#888; }
.hide { display:none; }

/* 行内高密度控制组 */
.prod-info { flex: 1; min-width: 0; }
.prod-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.control-group { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.ctrl-item { display: flex; align-items: center; font-size: 13px; color: #666; }
.ctrl-val { display: inline-block; min-width: 24px; text-align: center; font-weight: bold; color: #000; }

/* 🔴 右下角固定悬浮提交按钮 */
.float-submit {
  position: fixed;
  right: 16px;
  bottom: 20px;
  z-index: 99;
  background: #1677ff;
  color: #fff;
  border: none;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 4px 12px rgba(22, 119, 255, 0.4);
}
.float-submit:active { background: #0958d9; }
</style>
</head>

<body>

<div class="header">📦 门店开单系统 V2</div>

<div class="card">
<input id="search" placeholder="搜索员工 / 门店" oninput="handleSearch()" />
<div id="back" class="sub hide" onclick="goBack()">← 返回</div>
<div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let STATE = "EMP";
let employees = [];
let stores = [];
let products = [];

let currentEmployee = null;
let currentStores = [];
let orderData = null;

// INIT
async function init(){
  const e = await client.from('employees').select('*');
  const s = await client.from('stores_dim').select('*');
  const p = await client.from('products').select('*');

  employees = e.data || [];
  stores = s.data || [];
  products = p.data || [];

  renderEmployees();
}

function handleSearch(){
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
  else if(STATE === 'ORDER') renderOrder();
}

function getSearch(){
  return document.getElementById('search').value || '';
}

// EMP
function renderEmployees(){
  STATE = 'EMP';
  document.getElementById('back').classList.add('hide');

  const k = getSearch();

  const list = employees.filter(e=>
    (e.employee_name||'').includes(k) ||
    (e.employee_code||'').includes(k)
  );

  document.getElementById('list').innerHTML = list.map(e=>`
    <div class='item' onclick="openEmployee('${e.employee_code}','${e.employee_name}')">
      <div>
        <strong>${e.employee_name}</strong>
        <div class='sub'>${e.employee_code}</div>
      </div>
    </div>
  `).join('');
}

// STORE
async function openEmployee(code,name){
  STATE = 'STORE';
  currentEmployee = {code,name};

  document.getElementById('back').classList.remove('hide');
  document.getElementById('list').innerHTML = '加载中...';

  const r = await client.from('employee_stores')
    .select('atom_code')
    .eq('employee_code', code);

  const codes = (r.data||[]).map(i=>i.atom_code);
  currentStores = stores.filter(s=>codes.includes(s.atom_code));

  renderStores();
}

function renderStores(){
  STATE = 'STORE';
  const k = getSearch();
  const f = currentStores.filter(s=> (s.store_name||'').includes(k) );

  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:bold;margin-bottom:10px;'>当前员工：${currentEmployee.name}</div>
    ${f.map(s=>`
      <div class='item' onclick="openOrder('${s.atom_code}','${s.store_name}')">
        <div>
          <strong>${s.store_name}</strong>
          <div class='sub'>${s.atom_code}</div>
        </div>
      </div>
    `).join('')}
  `;
}

// ORDER
function openOrder(atom,name){
  STATE = 'ORDER';
  document.getElementById('back').classList.remove('hide');

  // 采用本地中国时区对齐日期格式
  const d = new Date();
  const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

  orderData = {
    atom,
    name,
    date: today,
    items: {}
  };

  renderOrder();
}

// 锚点平滑滚动定位
function scrollToBrand(brandId) {
  const el = document.getElementById(brandId);
  if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderOrder(){
  STATE = 'ORDER';

  const grouped = {};
  products.forEach(p=>{
    if(!grouped[p.brand]) grouped[p.brand]=[];
    grouped[p.brand].push(p);
  });

  const brands = Object.keys(grouped);

  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:bold;'>当前门店：${orderData.name}</div>
    <div class='row' style='margin-bottom:8px;'>
      <span>📅 <span id='dateText'>${orderData.date}</span></span>
      <button class='smallbtn' onclick='editDate()'>修改日期</button>
    </div>

    <div class='brand-nav'>
      ${brands.map(b => `<div class='brand-badge' onclick="scrollToBrand('b_${b}')">${b}</div>`).join('')}
    </div>

    ${brands.map(b=>`
      <div class='brand' id='b_${b}'>${b}</div>
      ${grouped[b].map(p=>`
        <div class='item'>
          <div class='prod-info'>
            <div class='prod-name'>${p.spec || ''}${p.product_name}</div>
          </div>
          
          <div class='control-group'>
            <div class='ctrl-item'>
              <button class='btn-counter' onclick="changeQty('${p.id}',-1)">-</button>
              <span class='ctrl-val' id='q_${p.id}'>${orderData.items[p.id]?.qty||0}</span>
              <button class='btn-counter' onclick="changeQty('${p.id}',1)">+</button>
            </div>
            
            <div class='ctrl-item'>
              <button class='btn-counter' onclick="changePrice('${p.id}',-0.1)">-</button>
              <span class='ctrl-val' id='p_${p.id}' style='min-width:35px;'>${orderData.items[p.id]?.price ?? p.default_price}</span>
              <button class='btn-counter' onclick="changePrice('${p.id}',0.1)">+</button>
              <span style="font-size:11px;color:#aaa;margin-left:2px;">元</span>
            </div>
          </div>
        </div>
      `).join('')}
    `).join('')}

    <button class='float-submit' onclick='submitOrder()'>🚀 提交订单</button>
  `;
}

function changeQty(id,v){
  if(!orderData.items[id]){
    const p = products.find(x=>x.id==id);
    orderData.items[id] = {qty:0, price:p.default_price};
  }
  orderData.items[id].qty = Math.max(0, (orderData.items[id].qty||0)+v);
  document.getElementById('q_'+id).innerText = orderData.items[id].qty;
}

function changePrice(id,v){
  if(!orderData.items[id]){
    const p = products.find(x=>x.id==id);
    orderData.items[id] = {qty:0, price:p.default_price};
  }
  orderData.items[id].price = +(orderData.items[id].price + v).toFixed(1);
  document.getElementById('p_'+id).innerText = orderData.items[id].price;
}

function editDate(){
  const d = prompt('修改日期', orderData.date);
  if(d){
    orderData.date = d;
    document.getElementById('dateText').innerText = d;
  }
}

async function submitOrder(){
  const hasItems = Object.keys(orderData.items).some(id => orderData.items[id].qty > 0);
  if(!hasItems){
    alert("请至少选择一件商品数量大于0");
    return;
  }

  const { data: o, error } = await client.from('orders').insert({
    employee_code: currentEmployee.code,
    atom_code: orderData.atom,
    order_date: orderData.date
  }).select().single();

  if(error){
    alert("主订单提交失败：" + error.message);
    return;
  }

  const items = [];
  Object.keys(orderData.items).forEach(id=>{
    const it = orderData.items[id];
    if(it.qty > 0){
      items.push({
        order_id: o.id,
        product_id: id,
        qty: it.qty,
        price: it.price
      });
    }
  });

  if(items.length > 0){
    const { error: itemErr } = await client.from('order_items').insert(items);
    if(itemErr){
      alert("商品明细提交失败：" + itemErr.message);
      return;
    }
  }

  alert('订单提交成功！');
  openEmployee(currentEmployee.code, currentEmployee.name);
}

// BACK
function goBack(){
  if(STATE === 'ORDER') openEmployee(currentEmployee.code,currentEmployee.name);
  else if(STATE === 'STORE') renderEmployees();
}

// 执行初始化
init();

</script>

</body>
</html>
