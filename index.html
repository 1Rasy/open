ackground: #fff;}.search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }.search-clear-btn:active { background: #d0c9d2; }.btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-weight: bold; font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-top: 4px; }.btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }.brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }.brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }.brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }.spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }.spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500;}.spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }.brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }.sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }.hide { display:none !important; }.history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }.float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }.stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box;}.stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }.stock-dir-select { padding: 5px 8px; background: #fff; border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }.alphabet-sidebar { position: fixed; right: 16px; top: 140px; bottom: 100px; width: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; background: rgba(255, 255, 255, 0.85); border-radius: 12px; box-shadow: 0 2px 8px rgba(74,21,75,0.08); border: 1px solid #eeeade; user-select: none; -webkit-user-select: none; }.amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; color: #2b1d2c; }.amount-summary-banner strong { font-size: 15px; }/* 订单明细网格排版：调整为并列 */.detail-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 4px; font-size: 13px; color: var(--text-muted); line-height: 1.4; }.detail-grid-item { display: flex; justify-content: space-between; align-items: center; }</style></head><body><div class="card"><div id="searchBlock" class="search-wrapper">
  <input id="search" placeholder="快速搜索..." oninput="handleSearch()" />
  <div id="clearSearch" class="search-clear-btn" onclick="clearSearchInput()">✕</div></div><div class="top-action-bar">

  <div id="editStateBadge" class="editing-badge hide">正在修改历史单据</div></div><div id="list"></div><div id="alphabetSidebar" class="alphabet-sidebar hide"></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script><script>const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);let STATE = "EMP"; let employees = [];let stores = []; let products = [];let currentEmployee = null;let currentStore = null; let orderData = null; let currentSelectedBrand = null; let currentSelectedSpec = "ALL"; let historyOrders = []; let stockData = {}; let selectedReportDate = ""; function isSpecialSpecOreo(productObj) {

      let displayCases = Math.floor(totalPcs / specCase);

    } else {

    }
  } else {
    let displayCases = Math.floor(totalPcs / specCase);
    let displayPcs = totalPcs % specCase;
    return showCase ? `${displayCases}件 ${displayPcs}个` : `${displayPcs}个`;
  }
}function getPriceDecimalPlaces(prodId) {

  return (idNum >= 49 && idNum <= 55) ? 2 : 1;

  const isOreo = isSpecialSpecOreo(productObj);

  if (isOreo) {

    const liveSingleBagPrice = livePrice / (specBox || 6);

  } else {

  } else {

}function updateStockInput(prodId, type, val){
  if(!stockData.additions[prodId]) stockData.additions[prodId] = { dir: 'plus', cases: 0, boxes: 0, pcs: 0 };
  if(type === 'dir') stockData.additions[prodId].dir = val;
  else stockData.additions[prodId][type] = parseInt(val) || 0;
}async function submitStock(){
  const addIds = Object.keys(stockData.additions);
  let hasData = false; const updates = []; const reportLines = []; 

  for(let id of addIds){
    const p = products.find(x => x.id == id);
    const isOreoSpecial = isSpecialSpecOreo(p);
    const specCase = p.pcs_per_case || 24; 
    const specBox = isOreoSpecial ? (p.pcs_per_box || 6) : (p.pcs_per_box || 0);
    
    const dir = stockData.additions[id].dir || 'plus';
    const addedCases = stockData.additions[id].cases || 0;
    const addedBoxes = stockData.additions[id].boxes || 0;
    const addedPcs = stockData.additions[id].pcs || 0;

    let delta = specBox > 0 ? (addedCases * specCase) + (addedBoxes * specBox) + addedPcs : (addedCases * specCase) + addedPcs;
    if(delta > 0){
      hasData = true; const currentTotal = stockData.currentStockMap[id] || 0;
      let newTotal = dir === 'plus' ? currentTotal + delta : currentTotal - delta;
      if (newTotal < 0) { alert(`❌ [${p.product_name}] 可用库存不足！`); return; }
      updates.push({ employee_code: stockData.emp_code, product_id: id, stock_qty: newTotal });
      reportLines.push(`• [${p.spec} ${p.product_name}] ${dir==='plus'?'增加':'减少'} : ${addedCases}件${addedBoxes}盒${addedPcs}个`);
    }
  }
  if(!hasData){ alert("请输入变更量！"); return; }
  await client.from('emp_stocks').upsert(updates, { onConflict: 'employee_code,product_id' });
  alert(`🌟 库存更新成功！\n\n${reportLines.join('\n')}`);
  openStockManagement();

}/* 📊 新增功能：打开并拉取指定日期的卖进业务汇总看板 */async function openSaleReport(targetDate) {

}function templateEditOrNew(orderId=null, orderDate=null, rawItemsEncoded=null, atom=null, name=null) {
  STATE = 'ORDER';
  if(orderId) {
    const items = JSON.parse(decodeURIComponent(rawItemsEncoded));
    orderData = { id: orderId, atom: currentStore.atom, name: currentStore.name, date: orderDate, items: {}, oldItemsMap: {} };
    items.forEach(it => {
      const parsedReturn = parseReturnHandleText(it.return_handle);
      orderData.items[it.product_id] = { 
        qty: it.qty, price: it.price, gift_qty: it.gift_qty || 0,
        return_qty: parsedReturn.qty, return_handle: parsedReturn.handle,
        showPanel: parsedReturn.qty > 0 || (it.gift_qty || 0) > 0
      };
      
      const pObj = products.find(x => x.id == it.product_id);
      const isOreoSpecial = isSpecialSpecOreo(pObj);
      const specBox = isOreoSpecial ? (pObj.pcs_per_box || 6) : 1;
      
      const saleBags = isOreoSpecial ? (it.qty * specBox) : it.qty;
      const giftBags = it.gift_qty || 0;
      const returnBags = parsedReturn.qty || 0;
      let oldNet = saleBags + giftBags;
      if (parsedReturn.handle === 'RESTORE') oldNet -= returnBags; 
      orderData.oldItemsMap[it.product_id] = oldNet; 
    });
    document.getElementById('editStateBadge').classList.remove('hide');
  } else {
    const d = new Date(); 
    const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    orderData = { atom, name, date: today, items: {}, oldItemsMap: {} }; 
    document.getElementById('editStateBadge').classList.add('hide');
  }

  if (products.length > 0) {
    const brands = [...new Set(products.map(p => p.brand))];
    currentSelectedBrand = brands.length > 0 ? brands[0] : null;
    currentSelectedSpec = "ALL";
  }
  renderOrder();

    orderData.items[id] = { qty: 0, price: defaultPriceVal, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; 
  }
}function pickerChangeQty(id, value) { initItemState(id); orderData.items[id].qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }function pickerChangePrice(id, value) { initItemState(id); orderData.items[id].price = parseFloat(value) || 0; calculateLiveOrderAmounts(); }function pickerChangeGiftQty(id, value) { initItemState(id); orderData.items[id].gift_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }function pickerChangeReturnQty(id, value) { initItemState(id); orderData.items[id].return_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }function toggleAfterSalePanel(id) { initItemState(id); orderData.items[id].showPanel = !orderData.items[id].showPanel; renderOrder(); }function setReturnHandle(id, h) { initItemState(id); orderData.items[id].return_handle = h; calculateLiveOrderAmounts(); }function syncSelectedDate(val){ if(!val) return; orderData.date = val; document.getElementById('dateText').innerText = val; }async function submitOrder(){
  let grandTotalQty = 0;
  Object.keys(orderData.items).forEach(id => {
    const it = orderData.items[id];
    grandTotalQty += (it.qty || 0) + (it.gift_qty || 0) + (it.return_qty || 0);
  });

  if (grandTotalQty === 0) {
    alert("⚠️ 订单中没有填写任何有效的销售、赠送或收回数量，无法提交空白单据！");
    return;
  }

  const submitBtn = document.querySelector('.float-submit');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '⏳ 提交中...'; }

  const { data: currentStocks } = await client.from('emp_stocks').select('*').eq('employee_code', currentEmployee.code);
  const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_id] = st.stock_qty || 0; });

  const stockUpdates = []; let isStockDeficit = false; 
  const allProdIds = new Set([...Object.keys(orderData.items), ...Object.keys(orderData.oldItemsMap || {})]);

  for (let id of allProdIds) {
    const item = orderData.items[id] || { qty: 0, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE' };
    const oldNetImpact = orderData.oldItemsMap?.[id] || 0; 
    
    const pObj = products.find(x => x.id == id);
    const isOreoSpecial = isSpecialSpecOreo(pObj);
    const specBox = isOreoSpecial ? (pObj.pcs_per_box || 6) : 1;

    const saleBags = isOreoSpecial ? (item.qty * specBox) : item.qty;
    const giftBags = item.gift_qty || 0;
    const returnBags = item.return_qty || 0;

    let currentNetImpact = saleBags + giftBags; 
    if (item.return_handle === 'RESTORE') {
      currentNetImpact -= returnBags; 
    }

    const delta = currentNetImpact - oldNetImpact; 
    const finalNewStock = (liveStockMap[id] || 0) - delta;

    if (finalNewStock < 0) isStockDeficit = true;
    if (delta !== 0 || item.qty > 0 || item.return_qty > 0 || item.gift_qty > 0) {
      stockUpdates.push({ employee_code: currentEmployee.code, product_id: id, stock_qty: finalNewStock });
    }
  }

  const formattedItems = [];
  Object.keys(orderData.items).forEach(id => { 
    const it = orderData.items[id]; 
    if(it.qty > 0 || it.return_qty > 0 || it.gift_qty > 0){ 
      const textValue = `${it.return_qty || 0}_${it.return_handle}`;
      formattedItems.push({ 
        product_id: id, qty: it.qty, price: it.price, gift_qty: it.gift_qty || 0, return_handle: textValue 
      }); 
    } 
  });

  if (orderData.id) {
    await client.from('orders').update({ order_date: orderData.date }).eq('id', orderData.id);
    await client.from('order_items').delete().eq('order_id', orderData.id);
    formattedItems.forEach(fit => fit.order_id = orderData.id);
    await client.from('order_items').insert(formattedItems); 
  } else {
    const { data: o } = await client.from('orders').insert({ employee_code: currentEmployee.code, atom_code: orderData.atom, order_date: orderData.date }).select().single();
    formattedItems.forEach(fit => fit.order_id = o.id);
    await client.from('order_items').insert(formattedItems); 
  }

  if (stockUpdates.length > 0) await client.from('emp_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_id' });
  alert(isStockDeficit ? '成功提交！库存出现负数，请注意补充。' : '提交成功！');
  
  orderData = null; 
  document.getElementById('editStateBadge').classList.add('hide');
  openStoreHistory(currentStore.atom, currentStore.name);
}function goBack(){
  document.getElementById('editStateBadge').classList.add('hide'); 
  if(STATE === 'STOCK' || STATE === 'REPORT') {
    orderData = null;
    renderStores(); 
  }
  else if(STATE === 'DETAIL') {
    renderHistory();
  }
  else if(STATE === 'ORDER') {
    if(orderData?.id) {
      const savedId = orderData.id;
      const savedDate = orderData.date;
      orderData = null; 
      viewOrderDetail(savedId, savedDate);
    } else {
      orderData = null;
      renderHistory();
    }
  }
  else if(STATE === 'HISTORY') {
    orderData = null;
    renderStores(); 
  }
  else if(STATE === 'STORE') {
    orderData = null;
    renderEmployees();
  }
}

init();</script></body></html>
