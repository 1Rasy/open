<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>系统首页 - 员工选择</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root { --primary: #4A154B; --bg-main: #f4f2f5; --text-main: #1f1121; --text-muted: #756676; --card-bg: #ffffff; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); }
    .search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
    .search-wrapper input { width:100%; padding:12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa; }
    .search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 0; }
    .emp-card { background: #faf9fa; border: 1px solid #eeeade; border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 12px; cursor: pointer; box-sizing: border-box; }
    .emp-card:active { background: #f3e2f5; transform: scale(0.97); }
    .sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }
    .hide { display:none !important; }
  </style>
</head>
<body>

<div class="card">
  <div class="search-wrapper">
    <input id="search" placeholder="🔍 输入姓名或工号搜索员工..." oninput="handleSearch()" />
  </div>
  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
  window.APP_STATE = { STATE: "EMP", employees: [], products: [] };

  async function initIndexPage() {
    document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';
    try {
      const e = await window.client.from('employees').select('*');
      const p = await window.client.from('products').select('*');
      window.APP_STATE.employees = e.data || [];
      window.APP_STATE.products = p.data || [];
      renderEmployees();
    } catch (err) {
      document.getElementById('list').innerHTML = '<div style="color:red;padding:10px;">加载失败，请检查网络</div>';
    }
  }

  function renderEmployees() {
    const k = document.getElementById('search').value || '';
    let list = window.APP_STATE.employees.filter(e => (e.employee_name || '').includes(k) || (e.employee_code || '').includes(k));
    
    // 后台静默拼音排序
    list.sort((a, b) => (a.employee_name || '').localeCompare((b.employee_name || ''), 'zh-CN'));

    if (list.length === 0) {
      document.getElementById('list').innerHTML = `<div class="sub" style="text-align:center;padding:30px;">⚠️ 未找到匹配的员工</div>`;
      return;
    }

    document.getElementById('list').innerHTML = `
      <div class="emp-grid">
        ${list.map(e => `
          <div class='emp-card' onclick="goToStore('${e.employee_code}','${e.employee_name}')">
            <strong style="font-size:16px; color:var(--primary); display:block; margin-bottom:4px;">${e.employee_name}</strong>
            <div class='sub' style="font-size:12px;">${e.employee_code}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function handleSearch() { renderEmployees(); }

  function goToStore(code, name) {
    window.location.href = `store.html?emp_code=${code}&emp_name=${encodeURIComponent(name)}`;
  }

  initIndexPage();
</script>
</body>
</html>
