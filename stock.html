<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>库存管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root { --primary: #4A154B; --bg-main: #f4f2f5; --text-main: #1f1121; --text-muted: #756676; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; }
    .top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; border: 1px solid #e2dde3; cursor: pointer;}
    .big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; }
    .stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box; }
    .stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
    .btn-toggle-dir { padding: 6px 12px; border: 1px solid var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; }
    .btn-toggle-dir.plus { background: #fff4fc; color: var(--primary); }
    .btn-toggle-dir.minus { background: #fff0f0; color: #d93025; border-color: #d93025; }
    .ios-picker { background: #f4f2f5; color: var(--text-main); border: 1px solid #dcd6dd; border-radius: 6px; padding: 6px; font-size: 14px; font-weight: 700; }
    .brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }
    .spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0; border-bottom: 1px dashed #e2dde3; padding-bottom:6px; }
    .spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; border: 1px solid #e2dde3; cursor: pointer; }
    .spec-badge.active { background: var(--primary); color: #ffffff; }
    .float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }
    .sub { font-size:13px; color: var(--text-muted); }
    .hide { display:none !important; }
  </style>
</head>
<body>

<div class="card">
  <div class="top-action-bar">
    <div class="back-btn" onclick="backToStore()">↩ 返回门店</div>
  </div>
  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/stock.js"></script>

<script>
  // 多网页节点补丁防卡死
  ['back', 'editStateBadge', 'alphabetSidebar', 'searchBlock'].forEach(id => {
    if (!document.getElementById(id)) {
      const dummy = document.createElement('div'); dummy.id = id; dummy.className = 'hide'; dummy.style.display = 'none';
      document.body.appendChild(dummy);
    }
  });

  window.APP_STATE = {
    STATE: "STOCK", products: [], currentSelectedSpec: "ALL", currentSelectedBrand: null,
    currentEmployee: { code: new URLSearchParams(window.location.search).get('emp_code'), name: new URLSearchParams(window.location.search).get('emp_name') }, 
    stockData: {}
  };

  // 修复核心：重写通用切换逻辑，让它在本页独立触发 renderStockPage
  window.switchBrand = function(b) {
    window.APP_STATE.currentSelectedBrand = b;
    window.APP_STATE.currentSelectedSpec = "ALL";
    window.renderStockPage();
  };
  window.switchSpec = function(s) {
    window.APP_STATE.currentSelectedSpec = s;
    window.renderStockPage();
  };

  async function initStockPage() {
    document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';
    const p = await window.client.from('products').select('*');
    window.APP_STATE.products = (p.data || []).map(x => ({ ...x, spec: (x.spec || '常规款').trim() }));
    
    await window.openStockManagement();
  }

  function backToStore() {
    window.location.href = `store.html?emp_code=${window.APP_STATE.currentEmployee.code}&emp_name=${encodeURIComponent(window.APP_STATE.currentEmployee.name)}`;
  }

  const originalSubmitStock = window.submitStock;
  window.submitStock = async function() {
    try { await originalSubmitStock(); } catch(e){}
    backToStore();
  };

  initStockPage();
</script>
</body>
</html>
